<!DOCTYPE html>
<html lang="it">
<head>

<style>

  .chip .bar{height:5px;background:#e5ebf0;border-radius:4px;margin-top:5px;overflow:hidden} .chip .bar i{display:block;height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .grid{display:grid;grid-template-columns:1fr;gap:16px;padding:16px 14px 0} @media(min-width:860px){.grid{grid-template-columns:1fr 320px}}

  .status{display:flex;align-items:center;gap:10px;margin:14px 0 2px;flex-wrap:wrap}

  .qsec{margin-bottom:14px}

  .qsec-label.rest{color:#475569} .qsec-label.p1{color:var(--primary)} .qsec-label.p2{color:#1d4ed8} .qsec-label.pb{color:#6d28d9} .qsec-label.p3{color:var(--muted)}
  .qsec-label .desc{font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted);font-size:11px}
  .q-list{display:flex;flex-direction:column;gap:9px}
  button.q{text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:11px 13px;cursor:pointer;font:inherit;color:var(--ink);transition:.13s;line-height:1.4}
  button.q:hover{border-color:var(--primary);background:var(--surface-2)}
  button.q.p1{border-left:3px solid var(--primary)} button.q.hot{border-left:3px solid var(--warn);background:#fffaf2}
  button.q.bridge{border-left:3px solid #7c3aed} button.q.bridge.on{background:#f7f3fe}
  button.q.r-rifor{border-left:3px solid #0891b2} button.q.r-emp{border-left:3px solid #db2777} button.q.r-ins{border-left:3px solid #7c3aed}
  .q .badges{display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap}
  .b{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:20px}
  .b.cat{background:#eef2f6;color:var(--muted)} .b.scoperta{background:#e7f0fb;color:#1d4ed8} .b.implicazione{background:#f0eafb;color:#6d28d9}
  .b.relazione{background:#e7f3f1;color:var(--primary-d)} .b.vendita{background:#fbeaea;color:#b91c1c} .b.ponte{background:#efe7fb;color:#6d28d9}
  .b.riformulazione{background:#e0f2fe;color:#0369a1} .b.empatia{background:#fce7f3;color:#be185d} .b.insight{background:#ede9fe;color:#6d28d9}
  .q .qtext{font-size:14px} .q .origin{font-size:11px;color:var(--muted);margin-top:5px} .q .origin::before{content:"↳ "}
  .q .framing{font-size:12px;color:#5b3aa6;margin-top:6px;font-style:italic}

  .doss h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:7px} .doss h4::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--primary)}
  .doss .group{margin-bottom:18px} .doss .group:last-child{margin-bottom:0}
  .doss .item{font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)} .doss .item:last-child{border-bottom:none}
  .doss .empty{font-size:12.5px;color:var(--muted);font-style:italic}
  .doss .need{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line)} .doss .need:last-child{border-bottom:none}
  .doss .need.locked{color:var(--muted)} .need .tags{display:flex;gap:5px;flex-shrink:0}
  .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:20px}
  .tag.disc{background:#e7f0fb;color:#1d4ed8} .tag.illum{background:#f0eafb;color:#6d28d9} .tag.crit{background:#fbeaea;color:#b91c1c}
  label.prop{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;margin-bottom:9px;transition:.13s}
  label.prop:hover{border-color:var(--primary)} label.prop.on{border-color:var(--primary);background:var(--surface-2)}
  label.prop input{margin-top:2px;width:17px;height:17px;accent-color:var(--primary);flex-shrink:0}
  label.prop .pn{font-weight:600;font-size:14px} label.prop .pd{font-size:12.5px;color:var(--muted)}
  .verdict{text-align:center;padding:6px 0 2px} .verdict .badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 13px;border-radius:30px;margin-bottom:12px}
  .verdict h2{font-size:26px;margin:0 0 4px} .verdict .sub{font-size:13px;color:var(--muted)}
  .db-stats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0} @media(min-width:560px){.db-stats{grid-template-columns:repeat(3,1fr)}}
  .db-stat .h{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px} .db-stat .h b{font-weight:700}
  .db-stat .bar{height:7px;background:#e5ebf0;border-radius:5px;overflow:hidden} .db-stat .bar i{display:block;height:100%;border-radius:5px} .db-stat .note{font-size:10.5px;color:var(--muted);margin-top:3px}
  .fb{border-left:3px solid var(--line);padding:3px 0 3px 13px;margin-bottom:11px;font-size:13.5px} .fb.good{border-color:var(--good)} .fb.bad{border-color:var(--bad)} .fb.tip{border-color:var(--warn)}
  .fb .t{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px} .fb.good .t{color:var(--good)} .fb.bad .t{color:var(--bad)} .fb.tip .t{color:var(--warn)}
  .hr{height:1px;background:var(--line);margin:18px 0} h3.block{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 12px}
  .intro h2{font-size:20px;margin:0 0 4px} .lead{font-size:13.5px;color:var(--muted)} .hint{font-size:12px;color:var(--muted);margin-top:9px}
  .pick{display:flex;flex-direction:column;gap:10px;margin:14px 0}
  button.arche{text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:13px 15px;cursor:pointer;font:inherit;color:var(--ink);transition:.13s}
  button.arche:hover{border-color:var(--primary);background:var(--surface-2)}
  .arche .an{font-weight:700;font-size:14px} .arche .ad{font-size:12.5px;color:var(--muted);margin-top:3px}
  .arche .traits{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
  .tr{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:20px;background:#eef2f6;color:var(--muted)}
  .person{display:flex;gap:13px;align-items:center;margin:14px 0;padding:13px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px}
  .avatar{width:52px;height:52px;border-radius:11px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;flex-shrink:0}
  .diff{display:inline-flex;gap:2px;margin-left:8px} .diff i{width:7px;height:7px;border-radius:50%;background:#cbd5e1} .diff i.on{background:var(--warn)}
  ul.vis{margin:8px 0 0;padding-left:18px;color:var(--muted);font-size:13.5px}

</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="row1"><div class="brand">Consulente Simulator <small>V8 · Scenari</small></div><div class="moves" id="moves"></div></div>
    <div class="stat-strip" id="strip"></div>
  </div>
  <div class="grid">
    <div><div class="card pad" id="main"></div></div>
    <div><div class="card pad doss" id="dossier"></div></div>
  </div>
</div>

<script>
"use strict";
const MAX_MOVES = 12, SOGLIA_CONSAP = 50, SATURA = 2;
const CHARGED = ["nostalgia","orgoglio","paura","preoccupazione"];
const clamp=v=>Math.max(0,Math.min(100,Math.round(v)));
const $=id=>document.getElementById(id);
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ============================================================
   GENERATORE — Tratti, Archetipi, Content Pack
   ============================================================ */
// Ogni tratto: deltas alle stat di partenza + moltiplicatori di reazione alle restituzioni.
const TRATTI = {
  orgoglioso:{stat:{fiducia:5}, emp:1.3, ins:1.0, rifor:1.1, prematura:1.0, soglia:0, desc:"orgoglioso"},
  ottimista:{stat:{pressione:-3,consapevolezza:-2}, emp:1.0, ins:0.9, rifor:1.0, prematura:1.0, soglia:0, minimizza:0.6, desc:"ottimista"},
  razionale:{stat:{}, emp:0.6, ins:1.35, rifor:1.0, prematura:1.1, soglia:0, desc:"razionale"},
  sbrigativo:{stat:{pressione:4}, emp:0.9, ins:1.0, rifor:0.85, prematura:1.2, soglia:-1, desc:"sbrigativo"},
  diffidente:{stat:{fiducia:-8,apertura:-4}, emp:0.7, ins:0.8, rifor:0.8, prematura:1.5, soglia:0, desc:"diffidente"},
  riservato:{stat:{apertura:-4}, emp:0.9, ins:0.9, rifor:1.0, prematura:1.2, soglia:0, desc:"riservato"},
  ansioso:{stat:{pressione:3}, emp:1.2, ins:1.1, rifor:1.0, prematura:1.0, soglia:0, desc:"ansioso"},
  storico:{stat:{fiducia:10}, emp:1.0, ins:1.0, rifor:0.55, prematura:1.0, soglia:0, desc:"cliente storico", relazione:0.7}
};

// Frasi di reazione alla RESTITUZIONE ARTIFICIALE, per causa e tratto (fallback generico).
const REAZIONI = {
  generico:{
    empatia_neutra:["Beh... non c'era bisogno di farne un dramma.","Sì, comunque... era solo un dato."],
    insight_vuoto:["Non so se arriverei a dire questo.","Mi sta un po' mettendo in bocca parole, no?"],
    eccesso:["Sì, ho capito che mi ascolta...","Sì, comunque. Vada pure avanti."]
  },
  razionale:{ empatia_neutra:["Restiamo ai fatti, se non le dispiace."], insight_vuoto:["Su cosa si basa, di preciso? Mi pare un salto."], eccesso:["Apprezzo, ma possiamo essere concreti?"] },
  diffidente:{ empatia_neutra:["Mi sembra che stia recitando una parte."], insight_vuoto:["Eh, ci va piano con le conclusioni."], eccesso:["Lei mi gira intorno. Dove vuole arrivare?"] },
  sbrigativo:{ empatia_neutra:["Sì sì, andiamo avanti."], insight_vuoto:["Va be', ma il punto qual è?"], eccesso:["Guardi, ho poco tempo. Al sodo."] },
  ansioso:{ empatia_neutra:["Ecco, ora mi mette ansia per niente."], insight_vuoto:["Davvero? Mi sta spaventando senza motivo?"], eccesso:["Mi sta confondendo, una cosa per volta."] }
};
function reazioneArtificiale(causa, tratti){
  for(const t of tratti){ if(REAZIONI[t] && REAZIONI[t][causa]) return pick(REAZIONI[t][causa]); }
  return pick(REAZIONI.generico[causa]);
}

/* ============================================================
   VARIABILITÀ LINGUISTICA — voce del cliente + pool di varianti
   (vive solo in fase di generazione: il motore logico non cambia)
   ============================================================ */
// La "voce" è il registro dominante, derivato dai tratti. Due clienti con lo
// stesso bisogno ma voce diversa pescano da pool diversi → sembrano persone diverse.
function voceDi(tratti){
  if(tratti.includes("diffidente")) return "diffidente";
  if(tratti.includes("razionale") && tratti.includes("sbrigativo")) return pick(["razionale","sbrigativo"]);
  if(tratti.includes("razionale")) return "razionale";
  if(tratti.includes("sbrigativo")) return "sbrigativo";
  if(tratti.includes("orgoglioso")) return pick(["orgoglioso","emotivo"]);
  return "emotivo";
}
// catena di fallback fra registri affini, così un pool incompleto degrada con grazia
const VOCE_FALLBACK={orgoglioso:["emotivo"],emotivo:["orgoglioso"],sbrigativo:["razionale"],razionale:["sbrigativo"],diffidente:["razionale","sbrigativo"]};
function variante(pool, voce){
  if(!pool) return null;
  const chain=[voce,...(VOCE_FALLBACK[voce]||[]),"neutro"];
  for(const v of chain){ if(pool[v] && pool[v].length) return pick(pool[v]); }
  return null;
}

// Pool di battute per nodo conversazionale. Ogni nodo: più registri × più varianti.
// (mancano slot? fill() li risolve dopo la scelta)
const VARIANTI={
  // ---- COMMERCIANTE (voce: orgoglioso | emotivo) ----
  rel_storia:{
    orgoglioso:["Era di mio padre. L'ho preso io a trent'anni e l'ho fatto crescere con le mie mani.","Bottega di famiglia. Trent'anni che la mando avanti io, e si vede."],
    emotivo:["Era di mio padre... l'ho preso io a trent'anni. È più di un lavoro, per me.","Me l'ha lasciato mio padre. Ogni volta che apro mi torna in mente lui."],
    neutro:["Era di mio padre, l'ho rilevato io a trent'anni."]
  },
  rel_negozio:{
    orgoglioso:["Lo mando avanti da solo, e bene. {coniuge} dà una mano, ma il timone è il mio.","Faccio tutto io e funziona. Non mi sono mai tirato indietro."],
    emotivo:["Lo porto avanti praticamente da solo... {coniuge} aiuta quando può, ma il grosso è sulle mie spalle.","Da solo, quasi sempre. A volte è pesante, non lo nascondo."],
    neutro:["Lo gestisco quasi tutto io. {coniuge} aiuta quando può."]
  },
  fam_chi:{
    orgoglioso:["{f1} ha {e1} anni, {f2} {e2}. Due in gamba, glielo dico io.","{f1} {e1}, {f2} {e2}. Crescono bene, e crescono le spese!"],
    emotivo:["{f1} ha {e1} anni, {f2} {e2}... crescono in fretta. Troppo in fretta.","I ragazzi: {f1} {e1}, {f2} {e2}. Sono tutto, per me."],
    neutro:["{f1} ha {e1} anni e {f2} {e2}."]
  },
  fu_padre:{
    orgoglioso:["È mancato cinque anni fa. Ma quello che mi ha insegnato lo porto avanti ogni giorno.","Cinque anni fa. Gli ho promesso che la bottega non chiudeva, e così è."],
    emotivo:["È mancato cinque anni fa... ma quando alzo la saracinesca è un po' come tenerlo vivo.","Non c'è più da cinque anni. Mi manca, sa. Ogni mattina."],
    neutro:["È mancato cinque anni fa."]
  },
  fu_significato:{
    orgoglioso:["Tutto. Trent'anni di vita, ogni giorno, da solo. E la mia famiglia mangia di questo.","È la mia opera. Quello che ho costruito quando nessuno ci credeva."],
    emotivo:["Tutto... la mia famiglia mangia di questo. Trent'anni della mia vita ci sono dentro.","È casa mia, più di casa mia. Non saprei chi sono senza."],
    neutro:["È tutto. La mia famiglia vive di questo."]
  },
  fu_continuita:{
    orgoglioso:["I figli, magari. Ma oggi regge tutto su di me. Se manco io chiude, ed è una cosa che non sopporto pensare.","Vorrei lasciarlo ai ragazzi. Però, diciamolo: senza di me, domani, chiude."],
    emotivo:["I figli, magari... ma è tutto sulle mie spalle. Se manco io chiude. Non ci voglio pensare.","Non lo so... se a me succede qualcosa, tutto questo finisce. Mi stringe lo stomaco solo a dirlo."],
    neutro:["I figli forse, ma per ora dipende tutto da me."]
  },
  fu_vendite:{
    orgoglioso:["Calate, lo ammetto. C'è l'online, il quartiere è cambiato. Ma io resisto.","Sono giù. Però chi resiste sono ancora io: gli altri han chiuso."],
    emotivo:["Calate... c'è l'online, il quartiere non è più quello. Mi dà pensiero, la notte.","Vanno giù, e mi preoccupa. Mi chiedo fino a quando reggo."],
    neutro:["Calate negli ultimi due anni. Mi preoccupa."]
  },
  fu_solo:{
    orgoglioso:["Senza di me chiude, è così. Non ci avevo pensato fino in fondo, ma è la verità.","Chiude. Faccio tutto io: è il mio vanto e, lo capisco ora, anche il mio punto debole."],
    emotivo:["...Senza di me chiude. Non ci avevo mai pensato fino in fondo. Adesso mi mette ansia.","Chiude, sì. Detta così mi fa un certo effetto."],
    neutro:["Senza di me chiuderebbe. Non ci avevo pensato così."]
  },
  fu_se_manco:{
    orgoglioso:["{coniuge} non reggerebbe negozio e casa insieme. Andremmo a fondo coi risparmi. E non lo accetterei.","Crollerebbe tutto. {coniuge} da sola non ce la farebbe, e a me l'idea fa venire i nervi."],
    emotivo:["{coniuge} non reggerebbe negozio e casa insieme... ci mangeremmo i risparmi e poi? Mi gela il sangue.","Andremmo a fondo. {coniuge} sola, i ragazzi... mi si chiude la gola a pensarci."],
    neutro:["{coniuge} non reggerebbe tutto. Finiremmo i risparmi in fretta."]
  },
  prot_implica_core:{
    orgoglioso:["...Non lo so. Mi mangerei i risparmi, e poi? Messa così non mi piace per niente.","Coi risparmi un po' tiro. Ma poi? Non ho una risposta, e questo mi pesa."],
    emotivo:["...Non lo so. Mi mangerei i risparmi e poi? Messa così fa paura davvero.","Non ci arrivo. Mi mangerei tutto e resterei a mani vuote. Mi spaventa."],
    neutro:["Non lo so. Userei i risparmi, ma poi non saprei."]
  },

function fill(str, id){ if(str==null) return str; return str.replace(/\{(\w+)\}/g,(m,k)=> ( id[k]!=null? id[k] : m)); }

function generaCliente(archId){
  const A = ARCHETIPI.find(a=>a.id===archId);
  const C = CATALOGHI[A.catalogo];
  const scen = SCENARI[pick(A.scenari)];
  const prof = pick(A.personalita);
  const id = C.identita();
  // reazioni + stat dalla personalità campionata
  const reaz = {emp:1,ins:1,rifor:1,prematura:1,soglia:3,minimizza:1,relazione:1};
  const stat = {...C.statBase};
  prof.forEach(t=>{const T=TRATTI[t]; if(!T)return;
    for(const k in (T.stat||{})) stat[k]=(stat[k]||0)+T.stat[k];
    reaz.emp*=T.emp; reaz.ins*=T.ins; reaz.rifor*=T.rifor; reaz.prematura*=T.prematura; reaz.soglia+=T.soglia;
    if(T.minimizza) reaz.minimizza*=T.minimizza; if(T.relazione) reaz.relazione*=T.relazione;
  });
  for(const k in stat) stat[k]=clamp(stat[k]);
  const voce = voceDi(prof);
  // insiemi attivi dallo scenario
  const activeNeeds = scen.bisogni;
  const activeInfo = new Set(scen.info);
  const activePonti = new Set(scen.ponti);
  const activeAreas = new Set(Object.keys(activeNeeds).map(n=>C.NEED_AREA[n]));
  // bisogni filtrati con priorità di scenario
  const BISOGNI={}, ORDINE=[];
  Object.keys(activeNeeds).forEach(nid=>{ const b=C.BISOGNI[nid]; if(!b)return;
    BISOGNI[nid]={label:b.label, requisiti:b.requisiti, propostaIdeale:b.propostaIdeale, trappole:b.trappole||[], peso:activeNeeds[nid].peso, critico:!!activeNeeds[nid].critico};
    ORDINE.push(nid);
  });
  // info filtrate (testo da INFO_TESTO con slot)
  const INFO={}; activeInfo.forEach(i=>{ if(C.INFO[i]) INFO[i]={...C.INFO[i], testo:fill(C.INFO_TESTO[i],id)}; });
  // proposte dei bisogni attivi
  const PROPOSTE={}; for(const pid in C.PROPOSTE){ if(activeNeeds[C.PROPOSTE[pid].bisogno]) PROPOSTE[pid]={...C.PROPOSTE[pid]}; }
  // domande filtrate per scenario
  const DOMANDE = C.DOMANDE.filter(q=>{
    if(q.tipo==="ponte") return activePonti.has(q.id);
    if(q.rivela && q.rivela.some(i=>!activeInfo.has(i))) return false;
    if(q.target && !activeNeeds[q.target]) return false;
    const r=q.requires||{};
    if(r.need && !activeNeeds[r.need]) return false;
    if(r.info && r.info.some(i=>!activeInfo.has(i))) return false;
    if(r.areaOpen && !activeAreas.has(r.areaOpen)) return false;
    return true;
  }).map(q=>{
    let reply=q.reply; const pool=VARIANTI[q.id];
    if(pool){ const v=variante(pool,voce); if(v) reply=v; }
    return {...q, testo:fill(q.testo,id), reply:fill(reply,id), framing:fill(q.framing,id)};
  });
  const nome = A.catalogo==="commerciante"? pick(["Antonio Greco","Salvatore Russo","Nicola De Luca","Pietro Amato"]) : pick(["Elena Ferraro","Marco Bianchi","Chiara Neri","Davide Conti"]);
  return {
    archetipo:A.id, catalogo:A.catalogo, scenario:scen.label, paura:scen.paura, nome, difficolta:A.difficolta,
    registro:C.registro, voce, sogliaConsap:SOGLIA_CONSAP,
    tratti:prof, reazioni:reaz, statBase:stat, identita:id, visibili:C.visibili.map(v=>fill(v,id)),
    INFO, BISOGNI, ORDINE, PROPOSTE, DOMANDE, THEMES:C.THEMES, NEED_AREA:C.NEED_AREA,
    riga:`${id.eta} anni · ${id.mestiere}${id.f1?` · genitore`:""}`
  };
}

   ENGINE (guidato da CL = cliente generato)
   ============================================================ */
let CL, S, needState, used, history, moves, discovered, convoEl, areaOpened;
let curPriority, curP1exists, curBridgeExists, restWindow, restStreak, restituzioni;

function initRun(cliente){
  CL=cliente;
  S={...CL.statBase}; S.coerenza=0; S.pertinenza=0; S.coerenzaConv=0;
  needState={}; CL.ORDINE.forEach(id=>needState[id]={discovered:false,illuminated:false});
  used=new Set(); history=[]; moves=0; discovered=new Set(); areaOpened=new Set();
  curPriority={}; curP1exists=false; curBridgeExists=false; restWindow=null; restStreak=0; restituzioni=[];
}
function dom(id){return CL.DOMANDE.find(x=>x.id===id);}
function recomputeNeeds(){const f=[];CL.ORDINE.forEach(id=>{if(needState[id].discovered)return;if(CL.BISOGNI[id].requisiti.every(g=>g.some(i=>discovered.has(i)))){needState[id].discovered=true;f.push(id);}});return f;}
function reqMet(r){if(!r)return true;if(r.opening)return true;if(r.info&&!r.info.every(i=>discovered.has(i)))return false;if(r.asked&&!r.asked.every(a=>used.has(a)))return false;if(r.need&&!(needState[r.need]&&needState[r.need].discovered))return false;if(r.apertura&&S.apertura<r.apertura)return false;if(r.areaOpen&&!areaOpened.has(r.areaOpen))return false;if(r.saturo&&!saturo(r.saturo))return false;if(r.needNot&&needState[r.needNot]&&needState[r.needNot].discovered)return false;return true;}
function frontier(){return CL.DOMANDE.filter(q=>!used.has(q.id)&&reqMet(q.requires));}
function themeDepth(t){const tg=CL.THEMES[t]||[];return history.filter(h=>(h.q.tags||[]).some(x=>tg.includes(x))).length;}
function saturo(t){return themeDepth(t)>=SATURA;}
function modConsap(base,q){ return (q.target&&q.target.indexOf("protezione")===0)? base*CL.reazioni.minimizza : base; }

function lastQ(){ return history.length? history[history.length-1].q : null; }
function recentTags(){ const s=new Set(); history.slice(-2).forEach(h=>(h.q.tags||[]).forEach(t=>s.add(t))); return s; }
function classify(){
  const avail=frontier(), last=lastQ();
  const spawn=last&&last.spawns?last.spawns:[];
  const rt=recentTags();
  const p1=[],p2=[],p3=[],bridges=[];
  avail.forEach(q=>{ if(q.tipo==="ponte"){bridges.push(q);return;} if(spawn.includes(q.id))p1.push(q); else if((q.tags||[]).some(t=>rt.has(t)))p2.push(q); else p3.push(q); });
  const emo=last?last.emotion:null;
  if(emo) p1.sort((a,b)=>((b.deepens===emo?1:0)-(a.deepens===emo?1:0)));
  const bridgeEmphasis=bridges.length>0 && p1.length<=1;
  return {p1,p2,p3,bridges,bridgeEmphasis,emo,last};
}

/* ---- significatività e connessioni (per la restituzione) ---- */
function connectionTarget(){
  for(const nid of CL.ORDINE){ const ns=needState[nid]; if(ns.illuminated) continue;
    const contrib=[...discovered].filter(i=>CL.INFO[i]&&(CL.INFO[i].bisogni||[]).includes(nid));
    if(contrib.length>=2) return nid;
    if(ns.discovered && contrib.length>=1) return nid;
  }
  return null;
}
function isSignificant(q,fresh){
  if(!q||q.tipo==="vendita"||q.tipo==="ponte") return false;
  if(CHARGED.includes(q.emotion)) return true;
  const lvl=Math.max(0,...((q.rivela||[]).map(i=>CL.INFO[i]?CL.INFO[i].livello:0)));
  if(lvl>=2) return true;
  if(fresh&&fresh.length) return true;
  if(connectionTarget()) return true;
  return false;
}

   RESTITUZIONE — risoluzione (gratuita, non consuma mosse)
   ============================================================ */
function restituisci(tipo){
  const last=lastQ(); const opt=(restWindow||[]).find(o=>o.tipo===tipo); if(!opt){return;}
  const r=CL.reazioni;
  const overMirror = restStreak>=r.soglia;             // eccesso di restituzioni consecutive
  let fit=true, causa=null, target=null;
  if(overMirror){ fit=false; causa="eccesso"; }
  else if(tipo==="empatia" && !CHARGED.includes(last.emotion)){ fit=false; causa="empatia_neutra"; }
  else if(tipo==="insight"){ target=opt.target; if(!target){ fit=false; causa="insight_vuoto"; } }

  addMsg("me rest",`<div class="txt">${opt.testo}</div>`);
  const before={...S};

  if(!fit){
    // RESTITUZIONE ARTIFICIALE — reazione conversazionale credibile + lieve raffreddamento
    const linea=reazioneArtificiale(causa, CL.tratti);
    S.fiducia=clamp(S.fiducia-3*r.prematura);
    S.apertura=clamp(S.apertura-2);
    S.pressione=clamp(S.pressione+4*r.prematura);
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${linea}</div>`);
    addMsg("cue",`${CL.nome.split(" ")[0]} ${pick(STATE_CUES.Diffidente)}.`);
    restStreak++;
    restituzioni.push({tipo,fit:false,causa});
    setStatus(emotionState({}), "ha percepito la tecnica");
  } else {
    let consapGain=0, illuminated=null, sys=[];
    if(tipo==="riformulazione"){
      S.fiducia=clamp(S.fiducia+4*r.rifor*r.relazione); S.apertura=clamp(S.apertura+4*r.rifor);
      addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("riformulazione")}</div>`);
    } else if(tipo==="empatia"){
      S.fiducia=clamp(S.fiducia+5*r.emp); S.apertura=clamp(S.apertura+4*r.emp); S.pressione=clamp(S.pressione-3*r.emp);
      addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("empatia")}</div>`);
    } else if(tipo==="insight"){
      consapGain=Math.round(12*r.ins);
      S.consapevolezza=clamp(S.consapevolezza+consapGain);
      const ns=needState[target];
      if(ns.discovered && !ns.illuminated){ ns.illuminated=true; illuminated=target; }
      const area=CL.NEED_AREA[target];
      if(area && !areaOpened.has(area)){ areaOpened.add(area); sys.push(`La tua sintesi apre una nuova area: <b>${CL.BISOGNI[target].label}</b>.`); }
      S.fiducia=clamp(S.fiducia+2);
      addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("insight")}</div>`);
    }
    addMsg("cue",`${CL.nome.split(" ")[0]} ${pick(STATE_CUES.Coinvolto.concat(STATE_CUES.Interessato))}.`);
    if(consapGain) addMsg("sys need",`↑ Consapevolezza generata dalla tua sintesi (+${consapGain}).`);
    if(illuminated) addMsg("sys need",`↑ Hai reso consapevole: <b>${CL.BISOGNI[illuminated].label}</b>.`);
    sys.forEach(m=>addMsg("sys thread",m));
    restStreak++;
    restituzioni.push({tipo,fit:true});
    setStatus(emotionState({consap:S.consapevolezza-before.consapevolezza}), "si sente ascoltato");
  }
  restWindow=null;
  renderStrip(); renderDossier(); renderMemline(); renderQuestions();
}

/* ============================================================
   DOMANDA — consuma una mossa
   ============================================================ */
function ask(id){
  const q=dom(id); const pri=curPriority[id]||3;
  const leaving=lastQ(); const leavingEmo=leaving?leaving.emotion:null;
  const isJump = pri===3 && (curP1exists||curBridgeExists);
  // chiudere una finestra di restituzione senza usarla = ho scelto di non restituire → azzera streak
  if(restWindow){ restWindow=null; restStreak=0; }
  used.add(id); moves++;
  if(q.tipo==="ponte") areaOpened.add(q.opens);

  const before={...S};
  let eff={...(q.eff||{})};
  if((q.tipo==="relazione"||q.tipo==="scoperta") && eff.fiducia>0) eff.fiducia*=CL.reazioni.relazione;
  S.fiducia=clamp(S.fiducia+(eff.fiducia||0)); S.apertura=clamp(S.apertura+(eff.apertura||0)); S.pressione=clamp(S.pressione+(eff.pressione||0));

  let jumpHurt=false;
  if(isJump && CHARGED.includes(leavingEmo)){ S.fiducia=clamp(S.fiducia-2); S.pressione=clamp(S.pressione+2); jumpHurt=true; }

  const reveals=q.rivela||[]; reveals.forEach(i=>discovered.add(i));
  const fresh=recomputeNeeds();
  let illuminated=null;
  if(q.tipo==="implicazione"&&needState[q.target]&&needState[q.target].discovered){ S.consapevolezza=clamp(S.consapevolezza+modConsap(q.consapBase,q)); needState[q.target].illuminated=true; illuminated=q.target; }
  const delta={f:S.fiducia-before.fiducia,a:S.apertura-before.apertura,p:S.pressione-before.pressione,consap:S.consapevolezza-before.consapevolezza};
  history.push({q,delta,reveals,illuminated,pri,wasJump:isJump});

  const myText=q.tipo==="ponte"?`<span style="opacity:.85">${q.framing}</span><br><br>${q.testo}`:q.testo;
  addMsg("me",`<div class="txt">${myText}</div>`);
  const stateEmo=emotionState(delta);
  const cue=jumpHurt?"il sorriso si spegne, cambiate discorso":cueFor(q.emotion,stateEmo,delta.p);
  const tagHtml=(q.tags&&q.tags.length)?`<div class="tagrow">${q.tags.map(t=>`<span class="ctag">${t}</span>`).join("")}</div>`:"";
  addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${q.reply}</div>${tagHtml}`);
  addMsg("cue",`${CL.nome.split(" ")[0]} ${cue}.`); setStatus(stateEmo,cue);

  if(jumpHurt) addMsg("sys bad",`Hai cambiato argomento mentre si stava aprendo: la confidenza resta a metà.`);
  if(q.tipo==="ponte") addMsg("sys thread",`Hai aperto una nuova area di analisi. Ora tocca a te scoprire e far emergere il bisogno.`);
  reveals.forEach(i=>addMsg("sys",`Hai scoperto: ${CL.INFO[i].testo}`));
  fresh.forEach(i=>addMsg("sys need",`★ Bisogno emerso: <b>${CL.BISOGNI[i].label}</b>${CL.BISOGNI[i].critico?" — critico":""}.`));
  if(illuminated) addMsg("sys need",`↑ Consapevolezza generata su: <b>${CL.BISOGNI[illuminated].label}</b>.`);
  if(q.tipo==="vendita") addMsg("sys bad",`Spinta di vendita prematura: la fretta brucia la fiducia.`);

  // apertura finestra di restituzione se la risposta è significativa
  if(isSignificant(q,fresh)) restWindow=restOptions(); else restWindow=null;

  renderStrip(); renderDossier(); renderMemline(); renderQuestions();
  if(moves>=MAX_MOVES){ addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">Devo andare. Mi dica: come ci muoviamo?</div>`); proposal(); }
}

/* ============================================================
   PROPOSTA / METRICHE / ESITO / DEBRIEF
   ============================================================ */
let propChoice;
function proposal(){
  propChoice=new Set();
  const known=CL.ORDINE.filter(i=>needState[i].discovered).map(i=>CL.BISOGNI[i].label);
  $("main").innerHTML=`<h2 style="font-size:19px;margin:0 0 4px">La proposta</h2>
    <p class="lead">${known.length?"Sono emersi: <b>"+known.join("</b>, <b>")+"</b>.":"Non è emerso quasi nulla."} Proponi solo ciò che hai scoperto e reso consapevole.</p>
    <div id="props" style="margin:16px 0"></div>
    <button class="btn primary" id="concludi">Concludi →</button>
    <button class="btn ghost" id="niente">Non propongo nulla (analisi)</button>`;
  const box=$("props");
  Object.entries(CL.PROPOSTE).forEach(([pid,p])=>{const lab=document.createElement("label");lab.className="prop";
    lab.innerHTML=`<input type="checkbox" value="${pid}"><span><span class="pn">${p.nome}</span><br><span class="pd">${p.desc}</span></span>`;
    const cb=lab.querySelector("input");cb.onchange=()=>{if(cb.checked){if(propChoice.size>=3){cb.checked=false;return;}propChoice.add(pid);lab.classList.add("on");}else{propChoice.delete(pid);lab.classList.remove("on");}};box.appendChild(lab);});
  $("concludi").onclick=()=>debrief([...propChoice]); $("niente").onclick=()=>debrief([]);
}
function calcCoerenza(sel){const traps=history.filter(h=>h.q.tipo==="vendita").length;
  if(sel.length===0){const disc=CL.ORDINE.filter(i=>needState[i].discovered);if(!disc.length)return clamp(0-traps*10);const r=disc.filter(i=>needState[i].illuminated).length/disc.length;return clamp(50+r*40-traps*10);}
  let s=0;sel.forEach(p=>{const n=CL.PROPOSTE[p].bisogno,ns=needState[n];s+=!ns.discovered?0:(ns.illuminated?100:45);});return clamp(s/sel.length-traps*10);}
function calcPertinenza(sel){if(!sel.length)return 0;let s=0;sel.forEach(p=>s+=CL.PROPOSTE[p].pert);return clamp(s/sel.length);}
function calcCoerenzaConv(){let fu=0,same=0,jumps=0,evol=0,rest=0;
  history.forEach(h=>{if(h.q.tipo==="ponte"){fu++;evol++;}else if(h.pri===1)fu++;else if(h.pri===2)same++;else if(h.wasJump)jumps++;});
  restituzioni.forEach(r=>{ if(r.fit)rest++; else jumps++; });
  return clamp(50+fu*7+same*3+evol*4+rest*5-jumps*12);
}
function decideEsito(sel,coer,pert){
  const critId=CL.ORDINE.find(i=>CL.BISOGNI[i].critico); const crit=needState[critId];
  const ready=crit.discovered&&crit.illuminated&&S.consapevolezza>=CL.sogliaConsap;
  const matched=new Set(sel.map(p=>CL.PROPOSTE[p].bisogno).filter(n=>needState[n]&&needState[n].discovered)); const nM=matched.size;
  const critProp=sel.some(p=>CL.PROPOSTE[p].bisogno===critId);
  const dc=CL.ORDINE.filter(i=>needState[i].discovered).length;
  if(S.pressione>=70||S.fiducia<=20)return{esito:"Cliente perso",kind:"bad"};
  if(sel.length===0){if(dc>=3&&S.fiducia>=45)return{esito:"Analisi completata",kind:"warn"};return{esito:"Nessun accordo",kind:"muted"};}
  if(!ready){if(S.fiducia>=45&&dc>=2)return{esito:"Appuntamento successivo",kind:"warn"};return{esito:"Nessun accordo",kind:"muted"};}
  if(!critProp)return{esito:"Appuntamento successivo",kind:"warn"};
  if(pert<40)return{esito:"Appuntamento successivo",kind:"warn"};
  if(coer>=80&&pert>=85&&S.pressione<=20&&S.consapevolezza>=70&&nM>=3)return{esito:"Cliente Promotore",kind:"good"};
  if(coer>=65&&pert>=70&&S.pressione<=30&&nM>=2)return{esito:"Cliente Fidelizzato",kind:"good"};
  if(nM>=2&&coer>=50)return{esito:"Cross Selling",kind:"good"};
  if(coer>=40)return{esito:"Vendita",kind:"good"};
  return{esito:"Appuntamento successivo",kind:"warn"};
}
function debrief(sel){
  S.coerenza=calcCoerenza(sel); S.pertinenza=calcPertinenza(sel); S.coerenzaConv=calcCoerenzaConv();
  const out=decideEsito(sel,S.coerenza,S.pertinenza);
  const col={good:"var(--good)",warn:"var(--warn)",bad:"var(--bad)",muted:"var(--muted)"}[out.kind];
  const bg={good:"#e7f3f1",warn:"#fbf0e3",bad:"#fbeaea",muted:"#eef2f6"}[out.kind];
  const battute={"Cliente Promotore":"Non mi ha venduto niente: mi ha aperto gli occhi. La consiglierò.","Cliente Fidelizzato":"Ora ho capito perché mi serve. Procediamo.","Cross Selling":"Mi ha convinto su più fronti. Sistemiamo tutto.","Vendita":"Va bene, su questo ci sto.","Appuntamento successivo":"Mi ha dato da pensare. Rivediamoci.","Analisi completata":"Non abbiamo concluso, ma è la chiacchierata più utile da anni.","Nessun accordo":"Oggi lasciamo stare.","Cliente perso":"Mi sono sentito solo spinto. Lasciamo perdere."};
  const disc=CL.ORDINE.filter(i=>needState[i].discovered),notDisc=CL.ORDINE.filter(i=>!needState[i].discovered);
  const critId=CL.ORDINE.find(i=>CL.BISOGNI[i].critico);
  const fitRest=restituzioni.filter(r=>r.fit).length, artRest=restituzioni.filter(r=>!r.fit).length;
  const evol=history.filter(h=>h.q.tipo==="ponte").length, jumps=history.filter(h=>h.wasJump).length;

  const fb=[];
  if(fitRest>0) fb.push(["good","Ascolto restituito","Hai restituito ciò che capivi "+fitRest+" volta/e (riformulazione, empatia, insight). Il cliente si è sentito capito, non interrogato."]);
  else fb.push(["tip","Solo domande","Non hai mai restituito ciò che capivi. La consulenza è rimasta un'intervista: prova a riformulare, empatizzare o collegare prima di incalzare."]);
  if(artRest>0) fb.push(["bad","Restituzione artificiale","Hai usato "+artRest+" restituzione/i fuori contesto: il cliente ha percepito la tecnica e si è raffreddato. Empatia su un dato freddo o insight senza elementi suonano falsi."]);
  if(evol>0) fb.push(["good","Consulenza in evoluzione","Hai aperto "+evol+" nuova/e area/e via ponte."]);
  if(jumps>0) fb.push(["bad","Continuità spezzata","Hai cambiato discorso a freddo "+jumps+" volta/e."]);
  if(needState[critId].illuminated) fb.push(["good","Bisogno critico reso consapevole",CL.BISOGNI[critId].label+": il cliente l'ha sentito, non solo sentito dire."]);
  else if(needState[critId].discovered) fb.push(["bad","Critico non reso consapevole","Avevi scoperto "+CL.BISOGNI[critId].label.toLowerCase()+", ma non l'hai illuminato (con un'implicazione o un insight)."]);
  else fb.push(["bad","Critico mai emerso",CL.BISOGNI[critId].label+" non è emerso."]);
  if(S.consapevolezza<CL.sogliaConsap) fb.push(["bad","Consapevolezza insufficiente","A "+S.consapevolezza+" (soglia "+CL.sogliaConsap+")."]);
  if(sel.length){const wrong=sel.filter(p=>CL.PROPOSTE[p].pert<55);
    if(wrong.length)fb.push(["bad","Soluzione poco pertinente","«"+wrong.map(p=>CL.PROPOSTE[p].nome).join(", ")+"»: poco adatta al profilo."]);
    else fb.push(["good","Proposta pertinente","Soluzioni coerenti con i vincoli del cliente."]);}

  const tips=[];
  if(artRest>0) tips.push("Restituisci solo quando c'è qualcosa da restituire: l'empatia vuole un'emozione, l'insight vuole almeno due informazioni da collegare.");
  if(fitRest===0) tips.push("Dopo una risposta importante, prima di rilanciare prova a dimostrare ascolto: spesso apre più di un'altra domanda.");
  if(!needState[critId].illuminated&&needState[critId].discovered) tips.push("Un insight ben fondato può rendere consapevole il bisogno critico anche senza incalzare con altre domande.");
  if(notDisc.length) tips.push("Aree rimaste chiuse: "+notDisc.map(i=>CL.BISOGNI[i].label).join(", ")+".");
  if(!tips.length) tips.push("Conduzione matura: ascolto, sintesi ed evoluzione. Cerca la consapevolezza su più bisogni per il massimo.");

  const ds=(l,k,c,n)=>`<div class="db-stat"><div class="h">${l}<b>${S[k]}</b></div><div class="bar"><i style="width:${S[k]}%;background:${c}"></i></div><div class="note">${n}</div></div>`;
  $("main").innerHTML=`
    <div class="verdict"><span class="badge" style="color:${col};background:${bg}">Esito</span><h2 style="color:${col}">${out.esito}</h2><div class="sub">${CL.nome} · scenario: ${CL.scenario} · ${CL.tratti.join(", ")} (voce ${CL.voce})</div><div class="sub" style="margin-top:3px;font-style:italic">Nucleo: ${CL.paura}</div></div>
    <div class="msg client" style="margin-top:16px"><div class="who">${CL.nome}</div><div class="txt">${battute[out.esito]}</div></div>
    <div class="hr"></div><h3 class="block">Statistiche</h3>
    <div class="db-stats">
      ${ds("Fiducia","fiducia","var(--c-fiducia)","si costruisce piano")}
      ${ds("Apertura","apertura","var(--c-apertura)","quanto si è lasciato esplorare")}
      ${ds("Pressione","pressione","var(--c-pressione)","quanto si è sentito spinto")}
      ${ds("Consapevolezza","consapevolezza","var(--c-consap)","quanto ha capito")}
      ${ds("Coerenza (metodo)","coerenza","#0891b2","qualità del percorso")}
      ${ds("Pertinenza","pertinenza","#b45309","qualità della soluzione")}
      ${ds("Coerenza convers.","coerenzaConv","#7c3aed","ascolto, continuità, sintesi")}
    </div>
    <div class="hr"></div><h3 class="block">Cosa è successo</h3>
    ${fb.map(([k,t,x])=>`<div class="fb ${k}"><div class="t">${t}</div>${x}</div>`).join("")}
    <div class="hr"></div><h3 class="block">Come migliorare</h3>
    ${tips.map(t=>`<div class="fb tip"><div class="t">Suggerimento</div>${t}</div>`).join("")}
    <button class="btn primary" id="again" style="margin-top:18px">Nuovo cliente ↺</button>`;
  $("again").onclick=intro; $("main").scrollIntoView({behavior:"smooth",block:"start"});
}

/* ============================================================
   INTRO — selezione/generazione cliente
   ============================================================ */
function intro(){
  $("strip").innerHTML=""; $("moves").innerHTML=""; $("dossier").innerHTML="";
  const cards=ARCHETIPI.map(a=>`<button class="arche" data-arch="${a.id}"><div class="an">${a.nome}<span class="diff">${[1,2,3,4,5].map(n=>`<i class="${n<=a.difficolta?'on':''}"></i>`).join("")}</span></div><div class="ad">${a.desc}</div><div class="traits"><span class="tr">${a.scenari.length} scenari</span><span class="tr">personalità variabile</span></div></button>`).join("");
  $("main").innerHTML=`<div class="intro"><h2>Consulente Simulator · V8</h2>
    <p class="lead">La V8 introduce il <b>modello a scenari</b>: ogni archetipo non è più un solo problema, ma campiona uno <b>scenario</b> (bisogno critico, informazioni, paura e percorso diversi) e una <b>personalità</b> in modo indipendente. Due clienti dello stesso archetipo possono quindi generare consulenze completamente diverse. Restano voce/variabilità linguistica e il sistema di restituzione.</p>
    <div class="pick">${cards}</div>
    <p class="hint">Scegli un archetipo: lo scenario e il carattere vengono estratti a sorte. Il problema lo scopri parlando — non è scritto in chiaro.</p></div>`;
  $("main").querySelectorAll("button.arche").forEach(b=>b.onclick=()=>avvia(b.dataset.arch));
}
function avvia(archId){
  const cliente=generaCliente(archId); initRun(cliente); renderStrip(); renderDossier();
  const fn=cliente.nome.split(" ")[0];
  $("main").innerHTML=`<div class="intro"><h2>${cliente.nome}</h2>
    <div class="person"><div class="avatar">${cliente.nome.split(" ").map(w=>w[0]).join("").slice(0,2)}</div><div><div style="font-weight:700">${cliente.nome}</div><div style="font-size:12.5px;color:var(--muted)">${cliente.riga} · ${cliente.tratti.join(", ")}</div><div class="traits" style="margin-top:6px"><span class="tr">voce: ${cliente.voce}</span></div></div></div>
    <div class="qsec-label p3">Quello che sai già</div><ul class="vis">${cliente.visibili.map(v=>`<li>${v}</li>`).join("")}</ul>
    <p class="hint">Difficoltà ${cliente.difficolta}/5. Ascolta, restituisci dove serve, fai emergere e rendi consapevole il bisogno. Hai ${MAX_MOVES} mosse (le restituzioni non le consumano).</p>
    <button class="btn primary" id="start" style="margin-top:14px">Inizia il colloquio →</button></div>`;
  $("start").onclick=startConvo;
}
function startConvo(){
  $("main").innerHTML=`<div id="convo"></div><div class="status"><span class="emo" id="emo"></span><span class="cue-now" id="cuenow"></span></div><div class="memline" id="memline"></div><div id="qarea"></div><button class="btn ghost" id="toProp">Passa alla proposta →</button>`;
  convoEl=$("convo");
  addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">Eccomi. Ho poco tempo, ma mi dica pure.</div>`);
  setStatus("Sereno","la saluta");
  renderMemline(); renderQuestions();
  $("toProp").onclick=()=>proposal();
}
intro();
</script>
