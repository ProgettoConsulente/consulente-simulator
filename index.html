<!DOCTYPE html>

<head>

<title>Consulente Simulator — Antonio Greco (follow-up contestuale)</title>
<style>
  :root{
    --bg:#eaeef2; --surface:#ffffff; --surface-2:#f5f8fa; --ink:#18242f; --muted:#5d6b7a;

  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}
  .app{max-width:1080px;margin:0 auto;padding:0 0 40px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:saturate(150%) blur(8px);
    border-bottom:1px solid var(--line);padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right))}
  .topbar .row1{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-weight:700;font-size:15px} .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted)}
  .moves{font-size:12px;color:var(--muted)} .moves b{color:var(--ink)}
  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:9px}
  .chip{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:6px 8px}
  .chip .h{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .chip .h b{font-size:13px;color:var(--ink)}
  .chip .bar{height:5px;background:#e5ebf0;border-radius:4px;margin-top:5px;overflow:hidden}
  .chip .bar i{display:block;height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .grid{display:grid;grid-template-columns:1fr;gap:16px;padding:16px 14px 0}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)} .pad{padding:18px}
  #convo{display:flex;flex-direction:column;gap:11px;max-height:44vh;overflow-y:auto;padding:4px 2px}
  @media(min-width:860px){#convo{max-height:50vh}}
  .msg{animation:fade .35s ease} @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .msg.client .who{font-size:11px;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .msg.client .txt{background:var(--surface-2);border:1px solid var(--line);border-radius:4px 13px 13px 13px;padding:11px 13px}
  .msg.me{align-self:flex-end;max-width:88%} .msg.me .txt{background:var(--primary);color:#eafffb;border-radius:13px 13px 4px 13px;padding:10px 13px;font-size:14px}
  .msg.cue{color:var(--muted);font-style:italic;font-size:13px;padding:0 6px}
  .msg.sys{font-size:12.5px;color:var(--primary-d);background:#e7f3f1;border:1px solid #cfe8e3;border-radius:9px;padding:7px 11px}
  .msg.sys.bad{color:#9a1d1d;background:#fbeaea;border-color:#f3cccc}
  .msg.sys.need{color:#5b2da8;background:#f0eafb;border-color:#ddccf3}
  .msg.sys.thread{color:#15803d;background:#e9f8ee;border-color:#c5ead2}
  .tagrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .ctag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:20px;background:#eef2f6;color:var(--muted)}
  .status{display:flex;align-items:center;gap:10px;margin:14px 0 2px;flex-wrap:wrap}
  .emo{font-size:12px;font-weight:700;padding:4px 11px;border-radius:30px;letter-spacing:.3px}
  .status .cue-now{font-size:13px;color:var(--muted);font-style:italic}
  .memline{font-size:11.5px;color:var(--muted);margin:0 0 12px;padding-left:2px}
  .memline b{color:var(--primary-d);font-weight:600}
  .qsec{margin-bottom:14px}
  .qsec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:0 0 8px;display:flex;align-items:center;gap:7px}
  .qsec-label.p1{color:var(--primary)} .qsec-label.p2{color:#1d4ed8} .qsec-label.p3{color:var(--muted)}
  .qsec-label .desc{font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted);font-size:11px}
  .q-list{display:flex;flex-direction:column;gap:9px}
  button.q{text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:11px 13px;cursor:pointer;font:inherit;color:var(--ink);transition:.13s;line-height:1.4}
  button.q:hover{border-color:var(--primary);background:var(--surface-2)}

  button.q.hot{border-left:3px solid var(--warn);background:#fffaf2}

  button.q.bridge.on{background:#f7f3fe;border-color:#7c3aed}
  .qsec-label.pb{color:#6d28d9}
  .bridge-lead{font-size:11.5px;color:#6d28d9;margin:-2px 0 9px;font-style:italic}
  .q .framing{font-size:12px;color:#5b3aa6;margin-top:6px;font-style:italic;line-height:1.4}
  .b.ponte{background:#efe7fb;color:#6d28d9}
  .q .badges{display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap}
  .b{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:20px}
  .b.cat{background:#eef2f6;color:var(--muted)}
  .b.scoperta{background:#e7f0fb;color:#1d4ed8} .b.implicazione{background:#f0eafb;color:#6d28d9}
  .b.relazione{background:#e7f3f1;color:var(--primary-d)} .b.vendita{background:#fbeaea;color:#b91c1c}
  .q .qtext{font-size:14px} .q .origin{font-size:11px;color:var(--muted);margin-top:5px} .q .origin::before{content:"↳ "}
  .btn{font:inherit;font-weight:600;border:none;border-radius:11px;padding:13px 18px;cursor:pointer;transition:.15s}

  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--muted);width:100%;margin-top:10px}
  .btn.ghost:hover{border-color:var(--primary);color:var(--ink)}
  .doss h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .doss h4::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--primary)}
  .doss .group{margin-bottom:18px} .doss .group:last-child{margin-bottom:0}
  .doss .item{font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)} .doss .item:last-child{border-bottom:none}
  .doss .empty{font-size:12.5px;color:var(--muted);font-style:italic}
  .doss .need{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line)} .doss .need:last-child{border-bottom:none}
  .doss .need.locked{color:var(--muted)} .need .tags{display:flex;gap:5px;flex-shrink:0}
  .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:20px}
  .tag.disc{background:#e7f0fb;color:#1d4ed8} .tag.illum{background:#f0eafb;color:#6d28d9} .tag.crit{background:#fbeaea;color:#b91c1c}
  label.prop{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;margin-bottom:9px;transition:.13s}
  label.prop:hover{border-color:var(--primary)} label.prop.on{border-color:var(--primary);background:var(--surface-2)}
  label.prop input{margin-top:2px;width:17px;height:17px;accent-color:var(--primary);flex-shrink:0}
  label.prop .pn{font-weight:600;font-size:14px} label.prop .pd{font-size:12.5px;color:var(--muted)}
  .verdict{text-align:center;padding:6px 0 2px}
  .verdict .badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 13px;border-radius:30px;margin-bottom:12px}
  .verdict h2{font-size:26px;margin:0 0 4px} .verdict .sub{font-size:13px;color:var(--muted)}
  .db-stats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0}
  @media(min-width:560px){.db-stats{grid-template-columns:repeat(3,1fr)}}
  .db-stat .h{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px} .db-stat .h b{font-weight:700}
  .db-stat .bar{height:7px;background:#e5ebf0;border-radius:5px;overflow:hidden} .db-stat .bar i{display:block;height:100%;border-radius:5px}
  .db-stat .note{font-size:10.5px;color:var(--muted);margin-top:3px}
  .fb{border-left:3px solid var(--line);padding:3px 0 3px 13px;margin-bottom:11px;font-size:13.5px}
  .fb.good{border-color:var(--good)} .fb.bad{border-color:var(--bad)} .fb.tip{border-color:var(--warn)}
  .fb .t{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
  .fb.good .t{color:var(--good)} .fb.bad .t{color:var(--bad)} .fb.tip .t{color:var(--warn)}
  .hr{height:1px;background:var(--line);margin:18px 0} h3.block{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 12px}
  .intro h2{font-size:20px;margin:0 0 4px}
  .intro .person{display:flex;gap:13px;align-items:center;margin:14px 0;padding:13px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px}
  .avatar{width:52px;height:52px;border-radius:11px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}
  .intro ul{margin:8px 0 0;padding-left:18px;color:var(--muted);font-size:13.5px}
  .lead{font-size:13.5px;color:var(--muted)} .hint{font-size:12px;color:var(--muted);margin-top:9px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="row1"><div class="brand">Consulente Simulator <small>Ponti conversazionali · Antonio Greco</small></div><div class="moves" id="moves"></div></div>
    <div class="stat-strip" id="strip"></div>

</div>

<script>
"use strict";
const MAX_MOVES = 12, SOGLIA_CONSAP = 50;
const CHARGED = ["nostalgia","orgoglio","paura","preoccupazione"];

const CLIENTE = {
  nome:"Antonio Greco", iniziali:"AG",
  riga:"49 anni · Commerciante · Negozio di abbigliamento · Sposato, due figli",
  statBase:{ fiducia:60, apertura:35, pressione:10, consapevolezza:5 },
  visibili:["Cliente da 6 anni","Possiede una polizza RC Auto","Titolare di un'attività commerciale"]
};
function modifica(eff,q){ const e={...eff}; if((q.tipo==="relazione"||q.tipo==="scoperta")&&e.fiducia>0) e.fiducia=e.fiducia*0.7; return e; }
function modConsap(base,q){ return q.target==="protezione_reddito"?base*0.6:base; }

const INFO = {
  attivita:{cat:"Attività",liv:1,testo:"Manda avanti il negozio praticamente da solo: l'attività dipende quasi tutta da lui."},
  famiglia:{cat:"Famiglia",liv:1,testo:"Sposato con Maria. Due figli: Marco (16) e Giulia (13)."},
  liquidita:{cat:"Patrimonio",liv:2,testo:"Circa 90.000 € fermi e inutilizzati sul conto corrente."},
  calo_vendite:{cat:"Attività",liv:2,testo:"Le vendite sono calate negli ultimi due anni. Lo vive con apprensione."},
  no_previdenza:{cat:"Previdenza",liv:2,testo:"Nessun piano pensionistico: conta solo sull'INPS."},
  paura_famiglia:{cat:"Protezione",liv:3,testo:"Teme di non garantire continuità economica alla famiglia se l'attività si fermasse."},
  futuro_figli:{cat:"Obiettivi",liv:3,testo:"Sogna di far studiare i figli all'università. Il loro futuro lo preoccupa."}
};
const BISOGNI = {
  protezione_reddito:{label:"Protezione del reddito",critico:true,peso:40,requisiti:[["attivita"],["calo_vendite","paura_famiglia"]]},
  previdenza:{label:"Previdenza",critico:false,peso:20,requisiti:[["no_previdenza"]]},
  risparmio_figli:{label:"Risparmio per i figli",critico:false,peso:20,requisiti:[["futuro_figli"]]},
  investimento_liquidita:{label:"Investimento della liquidità",critico:false,peso:20,requisiti:[["liquidita"]]}
};
const ORDINE_BISOGNI = ["protezione_reddito","previdenza","risparmio_figli","investimento_liquidita"];
const PROPOSTE = {
  p_protezione:{bisogno:"protezione_reddito",nome:"Protezione del reddito / continuità d'impresa",desc:"Indennità e rendita se un imprevisto lo tiene lontano dall'attività.",pert:95,bonusInfo:"paura_famiglia",bonus:5},
  p_vita_generica:{bisogno:"protezione_reddito",nome:"Polizza vita generica",desc:"Capitale ai beneficiari in caso di decesso.",pert:50},
  p_previdenza:{bisogno:"previdenza",nome:"Piano previdenziale integrativo (PIP)",desc:"Versamenti flessibili per integrare la pensione INPS.",pert:90},
  p_risparmio_figli:{bisogno:"risparmio_figli",nome:"Piano di accumulo per lo studio dei figli",desc:"Capitale costruito per tempo per l'università.",pert:90},
  p_investimento:{bisogno:"investimento_liquidita",nome:"Investimento prudente della liquidità",desc:"Far lavorare i 90.000 € fermi con rischio contenuto.",pert:85},
  p_investimento_aggr:{bisogno:"investimento_liquidita",nome:"Investimento azionario aggressivo",desc:"Massima esposizione ai mercati.",pert:30}
};

/* ============================================================
   GRAFO CONVERSAZIONALE — ogni risposta porta tag + emozione,
   e genera follow-up (spawns) che hanno priorità sullo schermo.
   ============================================================ */
const DOMANDE = [
  {id:"rel_saluto",cat:"Relazione",tipo:"relazione",requires:{opening:true},tags:["famiglia","attività"],emotion:null,spawns:["fam_chi"],
   testo:"Buongiorno Antonio, che piacere rivederla. Come va, a parte il lavoro?",eff:{fiducia:4,apertura:6,pressione:-2},
   reply:"Eh, si tira avanti. La famiglia bene. Il negozio... di quello magari parliamo."},
  {id:"rel_storia",cat:"Relazione",tipo:"relazione",requires:{opening:true},tags:["eredità","orgoglio","attività"],emotion:"nostalgia",spawns:["fu_padre","fu_significato","fu_continuita"],
   testo:"In sei anni non gliel'ho mai chiesto: come ha iniziato con il negozio?",eff:{fiducia:6,apertura:6,pressione:-2},
   reply:"Era di mio padre, l'ho preso io a trent'anni. È più di un lavoro per me, capisce?"},
  {id:"rel_negozio",cat:"Attività",tipo:"scoperta",requires:{opening:true},tags:["attività"],emotion:null,spawns:["fu_vendite","fu_solo"],rivela:["attivita"],
   testo:"Mi racconti: come procede il negozio in questo periodo?",eff:{fiducia:2,apertura:5,pressione:0},
   reply:"Lo mando avanti praticamente da solo. Mia moglie aiuta quando può, ma il grosso è sulle mie spalle."},
  {id:"fam_chi",cat:"Famiglia",tipo:"scoperta",requires:{opening:true},tags:["famiglia","figli"],emotion:null,spawns:["fu_figli_studio","fu_figli_eta"],rivela:["famiglia"],
   testo:"E la famiglia? I ragazzi crescono?",eff:{fiducia:3,apertura:4,pressione:0},
   reply:"Marco sedici, Giulia tredici. Crescono in fretta... e crescono pure le spese!"},

  /* follow-up da rel_storia */
  {id:"fu_padre",cat:"Relazione",tipo:"relazione",requires:{asked:["rel_storia"]},tags:["eredità","famiglia","nostalgia"],emotion:"nostalgia",deepens:"nostalgia",spawns:[],
   origin:"Ha nominato suo padre",testo:"Suo padre è ancora coinvolto, in qualche modo?",eff:{fiducia:5,apertura:4,pressione:-1},
   reply:"È mancato cinque anni fa. Ma quando alzo la saracinesca, è un po' come tenerlo vivo."},
  {id:"fu_significato",cat:"Relazione",tipo:"scoperta",requires:{asked:["rel_storia"]},tags:["orgoglio","attività","sacrificio","continuità"],emotion:"orgoglio",deepens:"orgoglio",spawns:["fu_continuita"],rivela:["attivita"],
   origin:"Vuoi sapere cosa rappresenta per lui",testo:"Cosa rappresenta oggi quel negozio per lei?",eff:{fiducia:5,apertura:4,pressione:0},
   reply:"Tutto. La mia famiglia mangia di questo. Ci ho messo trent'anni di vita, ogni giorno, da solo."},
  {id:"fu_continuita",cat:"Protezione",tipo:"scoperta",requires:{asked:["rel_storia"]},tags:["continuità","figli","paura","futuro"],emotion:"preoccupazione",deepens:"preoccupazione",spawns:["fu_se_manco","prot_implica_core"],rivela:["attivita","paura_famiglia"],
   origin:"Ha parlato di eredità: e il futuro?",testo:"Ha mai pensato a chi lo porterà avanti, un domani?",eff:{fiducia:4,apertura:3,pressione:-1},
   reply:"I figli, magari... ma è tutto sulle mie spalle. Se manco io il negozio chiude, e la famiglia... non lo so. Non ci voglio pensare."},

  /* follow-up da rel_negozio */
  {id:"fu_vendite",cat:"Attività",tipo:"scoperta",requires:{asked:["rel_negozio"]},tags:["attività","paura"],emotion:"preoccupazione",deepens:"preoccupazione",spawns:["fu_pensiero"],rivela:["calo_vendite"],
   origin:"Sul come va il negozio",testo:"E le vendite, rispetto a qualche anno fa?",eff:{fiducia:1,apertura:3,pressione:0},
   reply:"Calate. C'è l'online, il quartiere è cambiato. Mi dà pensiero, sì."},
  {id:"fu_solo",cat:"Protezione",tipo:"scoperta",requires:{asked:["rel_negozio"]},tags:["attività","sacrificio","continuità"],emotion:"preoccupazione",deepens:"preoccupazione",spawns:["fu_se_manco","prot_implica_core"],rivela:["attivita","paura_famiglia"],
   origin:"Ha detto che fa tutto da solo",testo:"Dipende quasi tutto da lei, allora. E se un giorno dovesse fermarsi?",eff:{fiducia:3,apertura:3,pressione:0},
   reply:"...Senza di me chiude. Non ci avevo pensato fino in fondo, ma è proprio così."},
  {id:"fu_pensiero",cat:"Patrimonio",tipo:"scoperta",requires:{asked:["fu_vendite"]},tags:["liquidità","paura","attività"],emotion:null,spawns:["inv_implica"],rivela:["liquidita"],
   origin:"Ha detto che le vendite la preoccupano",testo:"Questo pensiero la porta a tenere più da parte, per sicurezza?",eff:{fiducia:3,apertura:3,pressione:0},
   reply:"Sì, tengo tutto fermo sul conto. Saranno novantamila. Muoverli mi fa paura."},

  /* follow-up da fam_chi */
  {id:"fu_figli_studio",cat:"Obiettivi",tipo:"scoperta",requires:{asked:["fam_chi"]},tags:["figli","futuro"],emotion:null,spawns:["fu_figli_costo","obj_implica_figli"],rivela:["futuro_figli"],
   origin:"Ha parlato dei figli",testo:"Cosa sognano di fare, Marco e Giulia?",eff:{fiducia:2,apertura:3,pressione:0},
   reply:"Mi piacerebbe l'università per loro. Più scelte di quante ne ho avute io."},
  {id:"fu_figli_eta",cat:"Famiglia",tipo:"relazione",requires:{asked:["fam_chi"]},tags:["figli","famiglia","orgoglio"],emotion:"orgoglio",deepens:"orgoglio",spawns:[],rivela:[],
   origin:"Ha nominato i ragazzi",testo:"Le somigliano? Le danno soddisfazioni?",eff:{fiducia:4,apertura:3,pressione:-1},
   reply:"Marco ha la testa per i numeri, Giulia disegna che è una meraviglia. Sono la mia gioia, quei due."},
  {id:"fu_figli_costo",cat:"Obiettivi",tipo:"scoperta",requires:{asked:["fu_figli_studio"]},tags:["figli","futuro","liquidità"],emotion:null,spawns:["obj_implica_figli"],rivela:[],
   origin:"Ha parlato dell'università dei figli",testo:"Ha un'idea di quanto pesi, mantenerli all'università?",eff:{fiducia:2,apertura:2,pressione:0},
   reply:"Tanto, immagino. Coi tempi che corrono... non lo so di preciso, a essere sincero."},

  /* implicazioni — figlie del bisogno / della confidenza emotiva */
  {id:"fu_se_manco",cat:"Protezione",tipo:"implicazione",target:"protezione_reddito",requires:{need:"protezione_reddito"},tags:["continuità","paura","famiglia"],emotion:"paura",deepens:"paura",consapBase:18,spawns:["prot_implica_core"],
   origin:"Su quel «se manco io»",testo:"Quel «se manco io» pesa. Mettiamo sei mesi fermo per salute: a casa che succede?",eff:{fiducia:3,apertura:1,pressione:0},
   reply:"Maria non reggerebbe negozio e casa insieme. Andremmo a fondo coi risparmi. Detta così... mi gela."},

const THEMES = {
  famiglia_figli:["famiglia","figli","futuro"],
  attivita:["attività","sacrificio","eredità"],
  protezione:["protezione","continuità","paura"],
  previdenza:["pensione"],
  patrimonio:["liquidità","patrimonio"]
};
const SATURA = 2;
const AREA_LABEL = {protezione:"la protezione del reddito e la continuità dell'attività",previdenza:"la previdenza",patrimonio:"il patrimonio e la liquidità"};

/* ===== STATO ===== */
let S, needState, used, history, moves, discovered, convoEl, curPriority, curP1exists, curBridgeExists, areaOpened;
function init(){
  S={...CLIENTE.statBase}; S.coerenza=0; S.pertinenza=0; S.coerenzaConv=0;
  needState={}; ORDINE_BISOGNI.forEach(id=>needState[id]={discovered:false,illuminated:false});
  used=new Set(); history=[]; moves=0; discovered=new Set(); curPriority={}; curP1exists=false; curBridgeExists=false; areaOpened=new Set();
}
function themeDepth(t){const tg=THEMES[t]||[];return history.filter(h=>(h.q.tags||[]).some(x=>tg.includes(x))).length;}
function saturo(t){return themeDepth(t)>=SATURA;}
const clamp=v=>Math.max(0,Math.min(100,Math.round(v)));
const $=id=>document.getElementById(id);
function recomputeNeeds(){const f=[];ORDINE_BISOGNI.forEach(id=>{if(needState[id].discovered)return;if(BISOGNI[id].requisiti.every(g=>g.some(i=>discovered.has(i)))){needState[id].discovered=true;f.push(id);}});return f;}
function reqMet(r){if(!r)return true;if(r.opening)return true;if(r.info&&!r.info.every(i=>discovered.has(i)))return false;if(r.asked&&!r.asked.every(a=>used.has(a)))return false;if(r.need&&!(needState[r.need]&&needState[r.need].discovered))return false;if(r.apertura&&S.apertura<r.apertura)return false;if(r.areaOpen&&!areaOpened.has(r.areaOpen))return false;if(r.saturo&&!saturo(r.saturo))return false;if(r.needNot&&needState[r.needNot]&&needState[r.needNot].discovered)return false;return true;}
function frontier(){return DOMANDE.filter(q=>!used.has(q.id)&&reqMet(q.requires));}

/* ===== MEMORIA + CLASSIFICAZIONE per priorità ===== */
function lastQ(){ return history.length? history[history.length-1].q : null; }
function recentTags(){ const s=new Set(); history.slice(-2).forEach(h=>(h.q.tags||[]).forEach(t=>s.add(t))); return s; }
function classify(){
  const avail=frontier(), last=lastQ();
  const spawn = last&&last.spawns?last.spawns:[];
  const rt=recentTags();
  const p1=[],p2=[],p3=[],bridges=[];
  avail.forEach(q=>{
    if(q.tipo==="ponte"){ bridges.push(q); return; }
    if(spawn.includes(q.id)) p1.push(q);
    else if((q.tags||[]).some(t=>rt.has(t))) p2.push(q);
    else p3.push(q);
  });
  const emo=last?last.emotion:null;
  if(emo) p1.sort((a,b)=>((b.deepens===emo?1:0)-(a.deepens===emo?1:0)));
  const bridgeEmphasis = bridges.length>0 && p1.length<=1;
  return {p1,p2,p3,bridges,bridgeEmphasis,emo,last};
}

/* ===== EMOZIONI / PARAVERBALE ===== */
function emotionState(d){
  if(S.pressione>=55)return"Irritato"; if(S.pressione>=32)return"Diffidente";
  if(d&&d.consap>0&&S.consapevolezza>=28)return"Interessato";
  if(S.fiducia>=65&&S.apertura>=52&&S.pressione<=20)return"Coinvolto";
  if(S.fiducia>=55&&S.pressione<=22)return"Sereno"; return"Prudente";
}
const EMO_COLOR={Sereno:"#0f766e",Prudente:"#64748b",Interessato:"#2563eb",Coinvolto:"#7c3aed",Diffidente:"#b45309",Irritato:"#dc2626"};
const EMO_BG={Sereno:"#e7f3f1",Prudente:"#eef2f6",Interessato:"#e7f0fb",Coinvolto:"#f0eafb",Diffidente:"#fbf0e3",Irritato:"#fbeaea"};
const STATE_CUES={Coinvolto:["si sporge in avanti, coinvolto","annuisce con convinzione"],Interessato:["inclina la testa, incuriosito","ti guarda con più attenzione"],Sereno:["annuisce tranquillo","si appoggia allo schienale, rilassato"],Prudente:["misura le parole","ti osserva un istante"],Diffidente:["incrocia le braccia","cambia posizione sulla sedia"],Irritato:["sospira e guarda l'orologio","si irrigidisce"]};
const ANS_CUES={nostalgia:["sorride con nostalgia","per un attimo lo sguardo si perde lontano"],orgoglio:["si raddrizza, orgoglioso","gli si illumina il viso"],paura:["abbassa lo sguardo","la voce si fa più bassa"],preoccupazione:["si fa serio, una ruga sulla fronte","sospira pensieroso"]};
function cueFor(ansEmo,stateEmo,dp){
  if(dp>5) return STATE_CUES.Irritato[Math.floor(Math.random()*2)];
  if(ansEmo&&ANS_CUES[ansEmo]) return ANS_CUES[ansEmo][Math.floor(Math.random()*ANS_CUES[ansEmo].length)];
  const a=STATE_CUES[stateEmo]||STATE_CUES.Prudente; return a[Math.floor(Math.random()*a.length)];
}
const EMO_WORD={nostalgia:"nostalgico",orgoglio:"fiero",paura:"timoroso",preoccupazione:"preoccupato"};

/* ===== RENDER ===== */
function renderStrip(){$("moves").innerHTML=`Mosse <b>${moves}</b>/${MAX_MOVES}`;
  const d=[["Fiducia","fiducia","--c-fiducia"],["Apertura","apertura","--c-apertura"],["Pressione","pressione","--c-pressione"],["Consap.","consapevolezza","--c-consap"]];
  $("strip").innerHTML=d.map(([l,k,c])=>`<div class="chip"><div class="h">${l}<b>${S[k]}</b></div><div class="bar"><i style="width:${S[k]}%;background:var(${c})"></i></div></div>`).join("");}
function renderDossier(){
  const vis=CLIENTE.visibili.map(t=>`<div class="item">${t}</div>`).join("");
  const sco=discovered.size?[...discovered].map(i=>`<div class="item">${INFO[i].testo}</div>`).join(""):`<div class="empty">Nessuna ancora.</div>`;
  let bis="";const known=ORDINE_BISOGNI.filter(i=>needState[i].discovered),unknown=ORDINE_BISOGNI.filter(i=>!needState[i].discovered);
  known.forEach(i=>{const n=BISOGNI[i],ns=needState[i];let t="";if(n.critico)t+=`<span class="tag crit">critico</span>`;t+=`<span class="tag disc">scoperto</span>`;if(ns.illuminated)t+=`<span class="tag illum">consapevole</span>`;bis+=`<div class="need"><span>${n.label}</span><span class="tags">${t}</span></div>`;});
  unknown.forEach(()=>bis+=`<div class="need locked"><span>??? — non ancora emerso</span></div>`);
  $("dossier").innerHTML=`<div class="group"><h4>Informazioni visibili</h4>${vis}</div><div class="group"><h4>Informazioni scoperte</h4>${sco}</div><div class="group"><h4>Bisogni</h4>${bis}</div>`;
}
function renderMemline(){
  const last=lastQ();
  if(!last){ $("memline").innerHTML="Conversazione appena iniziata."; return; }
  const tags=[...recentTags()];
  let s = tags.length? `Filo attuale: <b>${tags.join(" · ")}</b>` : "";
  if(last.emotion && EMO_WORD[last.emotion]) s += ` — Antonio è sul ${EMO_WORD[last.emotion]}`;
  $("memline").innerHTML=s;
}

function renderQuestions(){
  const {p1,p2,p3,bridges,bridgeEmphasis,emo}=classify();
  curPriority={}; curP1exists=p1.length>0; curBridgeExists=bridges.length>0;
  const area=$("qarea");
  const card=(q,pri)=>{
    curPriority[q.id]=pri;
    const hot = pri===1 && emo && q.deepens===emo;
    return `<button class="q ${pri===1?(hot?'hot':'p1'):''}" data-id="${q.id}">
      <div class="badges"><span class="b cat">${q.cat}</span><span class="b ${q.tipo}">${q.tipo}</span></div>
      <div class="qtext">${q.testo}</div>
      ${hot?`<div class="origin">Antonio è sul ${EMO_WORD[emo]}: approfondisci</div>`:(q.origin?`<div class="origin">${q.origin}</div>`:'')}
    </button>`;
  };
  const bridgeCard=(q,on)=>{
    curPriority[q.id]="B";
    return `<button class="q bridge ${on?'on':''}" data-id="${q.id}">
      <div class="badges"><span class="b cat">${q.cat}</span><span class="b ponte">ponte</span></div>
      <div class="qtext">${q.testo}</div>
      <div class="framing">«${q.framing}»</div>
    </button>`;
  };
  const bridgeBand = bridges.length? `<div class="qsec"><div class="qsec-label pb">● Porta la consulenza più in là <span class="desc">— collega a una nuova area</span></div>${bridgeEmphasis?`<div class="bridge-lead">Hai esplorato a fondo questo tema: da qui puoi aprire una nuova direzione.</div>`:''}<div class="q-list">${bridges.map(q=>bridgeCard(q,bridgeEmphasis)).join("")}</div></div>` : "";
  const sections=[];
  if(p1.length) sections.push(`<div class="qsec"><div class="qsec-label p1">● Nasce da ciò che ha appena detto <span class="desc">— follow-up</span></div><div class="q-list">${p1.map(q=>card(q,1)).join("")}</div></div>`);
  if(bridgeEmphasis && bridgeBand) sections.push(bridgeBand);
  if(p2.length) sections.push(`<div class="qsec"><div class="qsec-label p2">● Approfondisci lo stesso tema</div><div class="q-list">${p2.map(q=>card(q,2)).join("")}</div></div>`);
  if(!bridgeEmphasis && bridgeBand) sections.push(bridgeBand);
  const p3s=p3.slice(0,5);
  if(p3s.length) sections.push(`<div class="qsec"><div class="qsec-label p3">● Apri un nuovo argomento <span class="desc">— scoperta</span></div><div class="q-list">${p3s.map(q=>card(q,3)).join("")}</div></div>`);
  area.innerHTML = sections.join("") || `<div class="empty">Hai esaurito i fili. È il momento di proporre.</div>`;
  area.querySelectorAll("button.q").forEach(b=>b.onclick=()=>ask(b.dataset.id));
}

function ask(id){
  const q=DOMANDE.find(x=>x.id===id);
  const pri=curPriority[id]||3;
  const leaving=lastQ();
  const leavingEmo=leaving?leaving.emotion:null;
  const isJump = pri===3 && (curP1exists||curBridgeExists);
  used.add(id); moves++;
  if(q.tipo==="ponte") areaOpened.add(q.opens);

  const eff=modifica(q.eff||{},q); const before={...S};
  S.fiducia=clamp(S.fiducia+(eff.fiducia||0));
  S.apertura=clamp(S.apertura+(eff.apertura||0));
  S.pressione=clamp(S.pressione+(eff.pressione||0));

  let jumpHurt=false;
  if(isJump && CHARGED.includes(leavingEmo)){ S.fiducia=clamp(S.fiducia-2); S.pressione=clamp(S.pressione+2); jumpHurt=true; }

  const reveals=q.rivela||[]; reveals.forEach(i=>discovered.add(i));
  const fresh=recomputeNeeds();
  let illuminated=null;
  if(q.tipo==="implicazione"&&needState[q.target]&&needState[q.target].discovered){
    S.consapevolezza=clamp(S.consapevolezza+modConsap(q.consapBase,q));
    needState[q.target].illuminated=true; illuminated=q.target;
  }
  const delta={f:S.fiducia-before.fiducia,a:S.apertura-before.apertura,p:S.pressione-before.pressione,consap:S.consapevolezza-before.consapevolezza};
  history.push({q,delta,reveals,illuminated,pri,wasJump:isJump});

  const myText = q.tipo==="ponte" ? `<span style="opacity:.85">${q.framing}</span><br><br>${q.testo}` : q.testo;
  addMsg("me",`<div class="txt">${myText}</div>`);
  const stateEmo=emotionState(delta);
  const cue=jumpHurt?"il sorriso si spegne, cambiate discorso":cueFor(q.emotion,stateEmo,delta.p);
  const tagHtml=(q.tags&&q.tags.length)?`<div class="tagrow">${q.tags.map(t=>`<span class="ctag">${t}</span>`).join("")}</div>`:"";
  addMsg("client",`<div class="who">${CLIENTE.nome}</div><div class="txt">${q.reply}</div>${tagHtml}`);
  addMsg("cue",`Antonio ${cue}.`);
  setStatus(stateEmo,cue);

  if(jumpHurt) addMsg("sys bad",`Hai cambiato argomento mentre si stava aprendo: la confidenza resta a metà.`);
  if(q.tipo==="ponte") addMsg("sys thread",`Hai aperto una nuova area di analisi: <b>${AREA_LABEL[q.opens]||q.opens}</b>. Ora tocca a te scoprire e far emergere il bisogno.`);
  reveals.forEach(i=>addMsg("sys",`Hai scoperto: ${INFO[i].testo}`));
  fresh.forEach(i=>addMsg("sys need",`★ Bisogno emerso: <b>${BISOGNI[i].label}</b>${BISOGNI[i].critico?" — critico":""}.`));
  if(illuminated) addMsg("sys need",`↑ Consapevolezza generata su: <b>${BISOGNI[illuminated].label}</b>.`);
  if(q.tipo==="vendita") addMsg("sys bad",`Spinta di vendita prematura: con un cliente che si fida già, la fretta brucia la fiducia.`);

  renderStrip(); renderDossier(); renderMemline(); renderQuestions();
  if(moves>=MAX_MOVES){ addMsg("client",`<div class="who">${CLIENTE.nome}</div><div class="txt">Senta, devo riaprire. Mi dica: come ci muoviamo?</div>`); proposal(); }
}

/* ===== PROPOSTA ===== */
let propChoice;
function proposal(){
  propChoice=new Set();
  const known=ORDINE_BISOGNI.filter(i=>needState[i].discovered).map(i=>BISOGNI[i].label);
  $("main").innerHTML=`<h2 style="font-size:19px;margin:0 0 4px">La proposta</h2>
    <p class="lead">${known.length?"Dai tuoi appunti sono emersi: <b>"+known.join("</b>, <b>")+"</b>.":"Non è emerso quasi nulla di concreto."} Proponi solo ciò che hai scoperto e reso consapevole.</p>
    <div id="props" style="margin:16px 0"></div>
    <button class="btn primary" id="concludi">Concludi la consulenza →</button>
    <button class="btn ghost" id="niente">Non propongo nulla (chiudo con l'analisi)</button>`;
  const box=$("props");
  Object.entries(PROPOSTE).forEach(([pid,p])=>{const lab=document.createElement("label");lab.className="prop";
    lab.innerHTML=`<input type="checkbox" value="${pid}"><span><span class="pn">${p.nome}</span><br><span class="pd">${p.desc}</span></span>`;
    const cb=lab.querySelector("input");cb.onchange=()=>{if(cb.checked){if(propChoice.size>=3){cb.checked=false;return;}propChoice.add(pid);lab.classList.add("on");}else{propChoice.delete(pid);lab.classList.remove("on");}};box.appendChild(lab);});
  $("concludi").onclick=()=>debrief([...propChoice]); $("niente").onclick=()=>debrief([]);
}

/* ===== METRICHE / ESITO ===== */
function calcCoerenza(sel){const traps=history.filter(h=>h.q.tipo==="vendita").length;
  if(sel.length===0){const disc=ORDINE_BISOGNI.filter(i=>needState[i].discovered);if(!disc.length)return clamp(0-traps*10);const r=disc.filter(i=>needState[i].illuminated).length/disc.length;return clamp(50+r*40-traps*10);}
  let s=0;sel.forEach(p=>{const n=PROPOSTE[p].bisogno,ns=needState[n];s+=!ns.discovered?0:(ns.illuminated?100:45);});return clamp(s/sel.length-traps*10);}
function calcPertinenza(sel){if(!sel.length)return 0;let s=0;sel.forEach(p=>{const pr=PROPOSTE[p];let v=pr.pert;if(pr.bonusInfo&&discovered.has(pr.bonusInfo))v=Math.min(100,v+pr.bonus);s+=v;});return clamp(s/sel.length);}
function calcCoerenzaConv(){
  let fu=0,same=0,jumps=0,evol=0;
  history.forEach(h=>{ if(h.q.tipo==="ponte"){fu++;evol++;} else if(h.pri===1)fu++; else if(h.pri===2)same++; else if(h.wasJump)jumps++; });
  return clamp(55+fu*8+same*3+evol*4-jumps*15);
}
function decideEsito(sel,coer,pert){
  const crit=needState.protezione_reddito;
  const ready=crit.discovered&&crit.illuminated&&S.consapevolezza>=SOGLIA_CONSAP;
  const matched=new Set(sel.map(p=>PROPOSTE[p].bisogno).filter(n=>needState[n].discovered)); const nM=matched.size;
  const critProp=sel.some(p=>PROPOSTE[p].bisogno==="protezione_reddito");
  const dc=ORDINE_BISOGNI.filter(i=>needState[i].discovered).length;
  if(S.pressione>=70||S.fiducia<=20)return{esito:"Cliente perso",kind:"bad"};
  if(sel.length===0){if(dc>=3&&S.fiducia>=45)return{esito:"Analisi completata",kind:"warn"};return{esito:"Nessun accordo",kind:"muted"};}
  if(!ready){if(S.fiducia>=45&&dc>=2)return{esito:"Appuntamento successivo",kind:"warn"};return{esito:"Nessun accordo",kind:"muted"};}
  if(!critProp)return{esito:"Appuntamento successivo",kind:"warn"};
  if(pert<40)return{esito:"Appuntamento successivo",kind:"warn"};
  if(critProp&&coer>=80&&pert>=85&&S.pressione<=20&&S.consapevolezza>=70&&nM>=3)return{esito:"Cliente Promotore",kind:"good"};
  if(critProp&&coer>=65&&pert>=70&&S.pressione<=30&&nM>=2)return{esito:"Cliente Fidelizzato",kind:"good"};
  if(critProp&&nM>=2&&coer>=50)return{esito:"Cross Selling",kind:"good"};
  if(critProp&&coer>=40)return{esito:"Vendita",kind:"good"};
  return{esito:"Appuntamento successivo",kind:"warn"};
}

/* ===== DEBRIEF ===== */
function debrief(sel){
  S.coerenza=calcCoerenza(sel); S.pertinenza=calcPertinenza(sel); S.coerenzaConv=calcCoerenzaConv();
  const out=decideEsito(sel,S.coerenza,S.pertinenza);
  const col={good:"var(--good)",warn:"var(--warn)",bad:"var(--bad)",muted:"var(--muted)"}[out.kind];
  const bg={good:"#e7f3f1",warn:"#fbf0e3",bad:"#fbeaea",muted:"#eef2f6"}[out.kind];
  const battute={
    "Cliente Promotore":"Lei non mi ha venduto niente: mi ha aperto gli occhi. Da domani la consiglio a mio fratello e a due colleghi.",
    "Cliente Fidelizzato":"Adesso ho capito perché mi serve. Procediamo. E sono contento di essermi affidato a lei.",
    "Cross Selling":"Mi ha convinto su più fronti. Sistemiamo tutto, mi fido.",
    "Vendita":"Va bene, su questo ci sto. Mi ha fatto vedere un rischio che davo per scontato.",
    "Appuntamento successivo":"Mi ha dato da pensare. Non firmo oggi, ma rivediamoci.",
    "Analisi completata":"Non abbiamo concluso niente di concreto, ma è la chiacchierata più utile che facciamo da anni.",
    "Nessun accordo":"Guardi, oggi lasciamo stare. Non ho sentito che mi servisse davvero qualcosa.",
    "Cliente perso":"Basta, mi sono sentito solo spinto. Pensavo di potermi fidare. Lasciamo perdere."
  };
  const disc=ORDINE_BISOGNI.filter(i=>needState[i].discovered),notDisc=ORDINE_BISOGNI.filter(i=>!needState[i].discovered);
  const traps=history.filter(h=>h.q.tipo==="vendita");
  const jumps=history.filter(h=>h.wasJump).length, fu=history.filter(h=>h.pri===1).length;
  const evol=history.filter(h=>h.q.tipo==="ponte").length;

  const fb=[];
  if(fu>=4) fb.push(["good","Continuità del dialogo","Hai seguito i fili che Antonio apriva ("+fu+" follow-up): è sembrata una conversazione, non un questionario."]);
  else fb.push(["bad","Conversazione frammentata","Pochi follow-up ("+fu+"): hai raccolto poco di ciò che Antonio offriva spontaneamente."]);
  if(evol>0) fb.push(["good","Consulenza in evoluzione","Hai costruito "+evol+" ponte/i tra i temi: invece di esaurire un argomento, l'hai usato per aprire una nuova area. È così che una consulenza avanza."]);
  else if(disc.length<3) fb.push(["bad","Consulenza ferma su un tema","Non hai mai collegato ciò che emergeva a una nuova area. Quando un tema si esaurisce, i ponti servono a far evolvere il colloquio invece di restare bloccati."]);
  if(jumps>0) fb.push(["bad","Cambi di argomento bruschi","Hai cambiato discorso "+jumps+" volta/e mentre si stava aprendo, invece di usare un ponte. Per un cliente come lui è stridente: lo si sente nel paraverbale."]);
  if(disc.length>=3) fb.push(["good","Ascolto","Hai fatto emergere "+disc.length+" bisogni su 4."]);
  else fb.push(["bad","Ascolto incompleto","Solo "+disc.length+" bisogno/i emerso/i."]);
  if(needState.protezione_reddito.illuminated) fb.push(["good","Rischio centrale reso consapevole","Antonio ha sentito la dipendenza dal negozio."]);
  else if(needState.protezione_reddito.discovered) fb.push(["bad","Bisogno critico non reso consapevole","Lo avevi scoperto ma non l'hai trasformato in consapevolezza."]);
  else fb.push(["bad","Bisogno critico mai emerso","La protezione del reddito non è emersa."]);
  if(S.consapevolezza<SOGLIA_CONSAP) fb.push(["bad","Consapevolezza insufficiente","A "+S.consapevolezza+" (soglia "+SOGLIA_CONSAP+"): non era pronto a decidere."]);
  if(traps.length) fb.push(["bad","Vendita anticipata","Hai spinto "+traps.length+" volta/e."]);
  if(sel.length){const wrong=sel.filter(p=>PROPOSTE[p].pert<55),guess=sel.filter(p=>!needState[PROPOSTE[p].bisogno].discovered);
    if(guess.length)fb.push(["bad","Proposta indovinata","Soluzioni per bisogni mai scoperti."]);
    if(wrong.length)fb.push(["bad","Soluzione poco pertinente","«"+wrong.map(p=>PROPOSTE[p].nome).join(", ")+"»: poco adatta al profilo prudente."]);
    if(!guess.length&&!wrong.length)fb.push(["good","Proposta coerente e pertinente","Ogni soluzione nasce da ciò che ti ha detto."]);}

  const tips=[];
  if(jumps>0) tips.push("Quando Antonio si emoziona o si confida, resta su quel filo: i follow-up in cima esistono apposta. Cambierai argomento dopo.");
  if(evol===0 && notDisc.length) tips.push("Quando un tema è stato esplorato a fondo, in fondo alle domande compaiono i ponti: usali per collegarti a una nuova area in modo naturale, invece di restare fermo o saltare a freddo.");
  if(!needState.protezione_reddito.illuminated&&needState.protezione_reddito.discovered) tips.push("Dopo aver toccato la dipendenza dal negozio, segui il follow-up «se manco io / sei mesi fermo»: è lì che nasce la consapevolezza.");
  if(notDisc.length) tips.push("Temi rimasti chiusi: "+notDisc.map(i=>BISOGNI[i].label).join(", ")+".");
  if(!tips.length) tips.push("Dialogo fluido, centrato e in evoluzione. Per il massimo, genera consapevolezza su più bisogni.");

  const ds=(l,k,c,n)=>`<div class="db-stat"><div class="h">${l}<b>${S[k]}</b></div><div class="bar"><i style="width:${S[k]}%;background:${c}"></i></div><div class="note">${n}</div></div>`;
  $("main").innerHTML=`
    <div class="verdict"><span class="badge" style="color:${col};background:${bg}">Esito del colloquio</span>
      <h2 style="color:${col}">${out.esito}</h2>
      <div class="sub">${sel.length?"Hai proposto "+sel.length+" soluzione/i":"Chiusura con l'analisi"}</div></div>
    <div class="msg client" style="margin-top:16px"><div class="who">${CLIENTE.nome}</div><div class="txt">${battute[out.esito]}</div></div>
    <div class="hr"></div><h3 class="block">Statistiche finali</h3>
    <div class="db-stats">
      ${ds("Fiducia","fiducia","var(--c-fiducia)","si costruisce piano, si perde in fretta")}
      ${ds("Apertura","apertura","var(--c-apertura)","quanto si è lasciato esplorare")}
      ${ds("Pressione","pressione","var(--c-pressione)","quanto si è sentito spinto")}
      ${ds("Consapevolezza","consapevolezza","var(--c-consap)","quanto ha capito i problemi")}
      ${ds("Coerenza (metodo)","coerenza","#0891b2","qualità del percorso consulenziale")}
      ${ds("Pertinenza","pertinenza","#b45309","qualità della soluzione")}
      ${ds("Coerenza convers.","coerenzaConv","#7c3aed","continuità del dialogo, non salti")}
    </div>
    <div class="hr"></div><h3 class="block">Cosa è successo</h3>
    ${fb.map(([k,t,x])=>`<div class="fb ${k}"><div class="t">${t}</div>${x}</div>`).join("")}
    <div class="hr"></div><h3 class="block">Come migliorare</h3>
    ${tips.map(t=>`<div class="fb tip"><div class="t">Suggerimento</div>${t}</div>`).join("")}
    <button class="btn primary" id="again" style="margin-top:18px">Conduci di nuovo il colloquio ↺</button>`;
  $("again").onclick=intro; $("main").scrollIntoView({behavior:"smooth",block:"start"});
}
intro();
</script>
