  .fstep .fn{width:18px;height:18px;border-radius:50%;background:#cbd5e1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .fstep.on .fn{background:var(--primary)} .fstep.done .fn{background:var(--good)}

  .prontezza{margin-top:9px} .prontezza .pl{font-size:11px;color:var(--muted);margin-bottom:4px}
  .prontezza .pbar{height:7px;background:#e5ebf0;border-radius:5px;overflow:hidden} .prontezza .pbar i{display:block;height:100%;border-radius:5px;transition:width .4s}
  .prontezza .pready{font-size:11px;color:var(--primary-d);font-weight:600;margin-top:4px}
  .pmastery{font-size:11px;color:var(--muted);margin-top:7px} .pmastery b{color:#7c3aed}
  button.q.centrale{border-left:3px solid var(--primary)} button.q.ammessa{border-left:3px solid #94a3b8}
  button.q.avanza{border-left:3px solid #7c3aed;background:#f7f3fe}
  button.q.fuori{border-left:3px solid #e2a23b;opacity:.85}
  .b.restituzione{background:#ede9fe;color:#6d28d9}
  .b.consapevolezza{background:#e6f4ef;color:#0f766e} .b.emersione{background:#fce7f3;color:#be185d} .b.proposta{background:#e7f3f1;color:var(--primary-d)}
  .tag.ric{background:#e9f8ee;color:#15803d} .tag.pri{background:#fff4e0;color:#b45309} .tag.cov{background:#e7f3f1;color:var(--primary-d)}
  .msg.sys.ok{color:#15803d;background:#e9f8ee;border:1px solid #c5ead2;border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:600}
</style>

<body>
<div class="app">
  <div class="topbar">
    <div class="row1"><div class="brand">Consulente Simulator <small>V9 · Macchina a fasi</small></div><div class="moves" id="moves"></div></div>
    <div class="stat-strip" id="strip"></div>
  </div>
  <div class="grid">
    <div><div class="card pad" id="main"></div></div>
    <div><div class="card pad doss" id="dossier"></div></div>
  </div>
</div>

<script>
"use strict";
const SALUTI={asciutto:["Buongiorno.","Salve."],cordiale:["Buongiorno, come va?","Buongiorno, piacere di rivederla.","Salve, come sta?","Buongiorno."]};
const CONSAP_LIQUIDITA={
 osservazione:"Quindi, oggi, gran parte di ciò che mette da parte resta ferma lì, sul conto.",
 curiosita:"Le faccio una domanda, così ci ragioniamo insieme: secondo lei, quella cifra, fra dieci anni, comprerà le stesse cose di oggi?",
 proiezione:"Si immagini fra dieci anni: la cifra sul conto è identica. Solo che, con quella, allora ci fa la metà delle cose. Come la farebbe sentire?",
 contrasto:"C'è una cosa che stride: da un lato lavora per mettere da parte, dall'altro quel risparmio resta immobile e, fermo, ogni anno perde un pezzetto.",
 implicazione:"Con il tempo, fermo, quel denaro perde potere d'acquisto. Anche non scegliere, in fondo, è una scelta.",
 reazioni:{
  piena:["Non ci avevo mai pensato, in effetti.","...Però è vero. Non l'avevo mai vista così.","Accidenti. Detta così, cambia le cose."],
  parziale:["Capisco cosa intende.","Sì, un fondo di verità c'è.","Mh. Può starci, in effetti."],
  resiste:["Ci ho riflettuto, ma muovere quei soldi mi preoccupa.","Lo so, però mi sento più tranquillo a saperli lì, fermi."],
  minimizza:["Può essere, ma preferisco comunque la liquidità.","Sarà, ma io dormo meglio a saperli sul conto."],
  controarg:["Sì, ma oggi i mercati sono un terno al lotto.","E se poi arriva un'altra crisi? Fermi, almeno, non li perdo."],
  ripetuto:["Su questo ci eravamo già arrivati.","Sì, quello l'ho capito."]
 }
};

const MAX_MOVES = 12, SOGLIA_CONSAP = 50, SATURA = 2;
const CHARGED = ["nostalgia","orgoglio","paura","preoccupazione"];
const clamp=v=>Math.max(0,Math.min(100,Math.round(v)));
const $=id=>document.getElementById(id);
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ============================================================
   GENERATORE — Tratti, Archetipi, Content Pack
   ============================================================ */
// Ogni tratto: deltas alle stat di partenza + moltiplicatori di reazione alle restituzioni.
const TRATTI = {
  orgoglioso:{stat:{fiducia:5}, emp:1.3, ins:1.0, rifor:1.1, prematura:1.0, soglia:0, desc:"orgoglioso"},
  ottimista:{stat:{pressione:-3,consapevolezza:-2}, emp:1.0, ins:0.9, rifor:1.0, prematura:1.0, soglia:0, minimizza:0.6, desc:"ottimista"},
  razionale:{stat:{}, emp:0.6, ins:1.35, rifor:1.0, prematura:1.1, soglia:0, desc:"razionale"},
  sbrigativo:{stat:{pressione:4}, emp:0.9, ins:1.0, rifor:0.85, prematura:1.2, soglia:-1, desc:"sbrigativo"},
  diffidente:{stat:{fiducia:-8,apertura:-4}, emp:0.7, ins:0.8, rifor:0.8, prematura:1.5, soglia:0, desc:"diffidente"},
  riservato:{stat:{apertura:-4}, emp:0.9, ins:0.9, rifor:1.0, prematura:1.2, soglia:0, desc:"riservato"},
  ansioso:{stat:{pressione:3}, emp:1.2, ins:1.1, rifor:1.0, prematura:1.0, soglia:0, desc:"ansioso"},
  storico:{stat:{fiducia:10}, emp:1.0, ins:1.0, rifor:0.55, prematura:1.0, soglia:0, desc:"cliente storico", relazione:0.7}
};

// Frasi di reazione alla RESTITUZIONE ARTIFICIALE, per causa e tratto (fallback generico).
const REAZIONI = {
  generico:{
    empatia_neutra:["Beh... non c'era bisogno di farne un dramma.","Sì, comunque... era solo un dato."],
    insight_vuoto:["Non so se arriverei a dire questo.","Mi sta un po' mettendo in bocca parole, no?"],
    eccesso:["Sì, ho capito che mi ascolta...","Sì, comunque. Vada pure avanti."]
  },
  razionale:{ empatia_neutra:["Restiamo ai fatti, se non le dispiace."], insight_vuoto:["Su cosa si basa, di preciso? Mi pare un salto."], eccesso:["Apprezzo, ma possiamo essere concreti?"] },
  diffidente:{ empatia_neutra:["Mi sembra che stia recitando una parte."], insight_vuoto:["Eh, ci va piano con le conclusioni."], eccesso:["Lei mi gira intorno. Dove vuole arrivare?"] },
  sbrigativo:{ empatia_neutra:["Sì sì, andiamo avanti."], insight_vuoto:["Va be', ma il punto qual è?"], eccesso:["Guardi, ho poco tempo. Al sodo."] },
  ansioso:{ empatia_neutra:["Ecco, ora mi mette ansia per niente."], insight_vuoto:["Davvero? Mi sta spaventando senza motivo?"], eccesso:["Mi sta confondendo, una cosa per volta."] }
};
function reazioneArtificiale(causa, tratti){
  for(const t of tratti){ if(REAZIONI[t] && REAZIONI[t][causa]) return pick(REAZIONI[t][causa]); }
  return pick(REAZIONI.generico[causa]);
}

/* ============================================================
   VARIABILITÀ LINGUISTICA — voce del cliente + pool di varianti
   (vive solo in fase di generazione: il motore logico non cambia)
   ============================================================ */
// La "voce" è il registro dominante, derivato dai tratti. Due clienti con lo
// stesso bisogno ma voce diversa pescano da pool diversi → sembrano persone diverse.
function voceDi(tratti){
  if(tratti.includes("diffidente")) return "diffidente";
  if(tratti.includes("razionale") && tratti.includes("sbrigativo")) return pick(["razionale","sbrigativo"]);
  if(tratti.includes("razionale")) return "razionale";
  if(tratti.includes("sbrigativo")) return "sbrigativo";
  if(tratti.includes("orgoglioso")) return pick(["orgoglioso","emotivo"]);
  return "emotivo";
}
// catena di fallback fra registri affini, così un pool incompleto degrada con grazia
const VOCE_FALLBACK={orgoglioso:["emotivo"],emotivo:["orgoglioso"],sbrigativo:["razionale"],razionale:["sbrigativo"],diffidente:["razionale","sbrigativo"]};
function variante(pool, voce){
  if(!pool) return null;
  const chain=[voce,...(VOCE_FALLBACK[voce]||[]),"neutro"];
  for(const v of chain){ if(pool[v] && pool[v].length) return pick(pool[v]); }
  return null;
}

// Pool di battute per nodo conversazionale. Ogni nodo: più registri × più varianti.
// (mancano slot? fill() li risolve dopo la scelta)
const VARIANTI={
  // ---- COMMERCIANTE (voce: orgoglioso | emotivo) ----
  rel_storia:{
    orgoglioso:["Era di mio padre. L'ho preso io a trent'anni e l'ho fatto crescere con le mie mani.","Bottega di famiglia. Trent'anni che la mando avanti io, e si vede."],
    emotivo:["Era di mio padre... l'ho preso io a trent'anni. È più di un lavoro, per me.","Me l'ha lasciato mio padre. Ogni volta che apro mi torna in mente lui."],
    neutro:["Era di mio padre, l'ho rilevato io a trent'anni."]
  },
  rel_negozio:{
    orgoglioso:["Lo mando avanti da solo, e bene. {coniuge} dà una mano, ma il timone è il mio.","Faccio tutto io e funziona. Non mi sono mai tirato indietro."],
    emotivo:["Lo porto avanti praticamente da solo... {coniuge} aiuta quando può, ma il grosso è sulle mie spalle.","Da solo, quasi sempre. A volte è pesante, non lo nascondo."],
    neutro:["Lo gestisco quasi tutto io. {coniuge} aiuta quando può."]
  },

      {id:"disc_salute",cat:"Salute",tipo:"scoperta",requires:{opening:true},tags:["salute","paura"],emotion:"preoccupazione",deepens:"preoccupazione",spawns:["disc_fragilita","impl_salute"],rivela:["problema_salute"],

      {id:"prot_implica_core",cat:"Protezione",tipo:"implicazione",target:"protezione_reddito",requires:{need:"protezione_reddito"},tags:["continuità","paura","liquidità"],emotion:"preoccupazione",deepens:"preoccupazione",consapBase:30,spawns:[],

      {id:"fu_se_manco",cat:"Protezione",tipo:"implicazione",target:"protezione_reddito",requires:{need:"protezione_reddito"},tags:["continuità","paura","famiglia"],emotion:"paura",deepens:"paura",consapBase:18,spawns:["prot_implica_core"],

      {id:"prev_implica",cat:"Previdenza",tipo:"implicazione",target:"previdenza",requires:{info:["no_previdenza"],need:"previdenza"},tags:["pensione","futuro","paura"],emotion:"preoccupazione",deepens:"preoccupazione",consapBase:16,spawns:[],

      {id:"obj_implica_figli",cat:"Obiettivi",tipo:"implicazione",target:"risparmio_figli",requires:{info:["futuro_figli"],need:"risparmio_figli"},tags:["figli","futuro"],emotion:null,consapBase:18,spawns:[],

      {id:"impl_salute",cat:"Salute",tipo:"implicazione",target:"protezione_salute",requires:{need:"protezione_salute"},tags:["salute","paura","famiglia"],emotion:"paura",deepens:"paura",consapBase:28,spawns:[],

function fill(str, id){ if(str==null) return str; return str.replace(/\{(\w+)\}/g,(m,k)=> ( id[k]!=null? id[k] : m)); }

function generaCliente(archId){
  const A = ARCHETIPI.find(a=>a.id===archId);
  const C = CATALOGHI[A.catalogo];
  const scenKey = pick(A.scenari);
  const scen = SCENARI[scenKey];
  const nar = SCENA[scenKey] || {};
  const prof = pick(A.personalita);
  const id = C.identita();
  if(nar.eta) id.eta = pick(nar.eta);
  if(nar.anni) id.anniCliente = pick(nar.anni);
  // reazioni + stat dalla personalità campionata
  const reaz = {emp:1,ins:1,rifor:1,prematura:1,soglia:3,minimizza:1,relazione:1};
  const stat = {...C.statBase};
  prof.forEach(t=>{const T=TRATTI[t]; if(!T)return;
    for(const k in (T.stat||{})) stat[k]=(stat[k]||0)+T.stat[k];
    reaz.emp*=T.emp; reaz.ins*=T.ins; reaz.rifor*=T.rifor; reaz.prematura*=T.prematura; reaz.soglia+=T.soglia;
    if(T.minimizza) reaz.minimizza*=T.minimizza; if(T.relazione) reaz.relazione*=T.relazione;
  });
  for(const k in stat) stat[k]=clamp(stat[k]);
  const voce = voceDi(prof);
  // insiemi attivi dallo scenario
  const activeNeeds = scen.bisogni;
  const activeInfo = new Set(scen.info);
  const activePonti = new Set(scen.ponti);
  const activeAreas = new Set(Object.keys(activeNeeds).map(n=>C.NEED_AREA[n]));
  // bisogni filtrati con priorità di scenario
  const BISOGNI={}, ORDINE=[];
  Object.keys(activeNeeds).forEach(nid=>{ const b=C.BISOGNI[nid]; if(!b)return;
    BISOGNI[nid]={label:b.label, insight:b.insight, consap:b.consap, requisiti:b.requisiti, propostaIdeale:b.propostaIdeale, trappole:b.trappole||[], peso:activeNeeds[nid].peso, critico:!!activeNeeds[nid].critico};
    ORDINE.push(nid);
  });
  // info filtrate (testo da INFO_TESTO con slot)
  const INFO={}; activeInfo.forEach(i=>{ if(C.INFO[i]) INFO[i]={...C.INFO[i], testo:fill(C.INFO_TESTO[i],id)}; });
  // proposte dei bisogni attivi
  const PROPOSTE={}; for(const pid in C.PROPOSTE){ if(activeNeeds[C.PROPOSTE[pid].bisogno]) PROPOSTE[pid]={...C.PROPOSTE[pid]}; }
  // domande filtrate per scenario
  const DOMANDE = C.DOMANDE.filter(q=>{
    if(q.tipo==="ponte") return activePonti.has(q.id);
    if(q.rivela && q.rivela.some(i=>!activeInfo.has(i))) return false;
    if(q.target && !activeNeeds[q.target]) return false;
    const r=q.requires||{};
    if(r.need && !activeNeeds[r.need]) return false;
    if(r.info && r.info.some(i=>!activeInfo.has(i))) return false;
    if(r.areaOpen && !activeAreas.has(r.areaOpen)) return false;
    return true;
  }).map(q=>{
    let reply=q.reply; const pool=VARIANTI[q.id];
    if(pool){ const v=variante(pool,voce); if(v) reply=v; }
    return {...q, testo:fill(q.testo,id), reply:fill(reply,id), framing:fill(q.framing,id)};
  });
  const nome = A.catalogo==="commerciante"? pick(["Antonio Greco","Salvatore Russo","Nicola De Luca","Pietro Amato"]) : pick(["Elena Ferraro","Marco Bianchi","Chiara Neri","Davide Conti"]);
  return {
    archetipo:A.id, catalogo:A.catalogo, scenario:scen.label, paura:scen.paura, nome, difficolta:A.difficolta,
    registro:C.registro, voce, sogliaConsap:SOGLIA_CONSAP,
    tratti:prof, reazioni:reaz, statBase:stat, identita:id, visibili:(nar.visibili||C.visibili).map(v=>fill(v,id)),
    apertura:pick(SALUTI[(prof.includes("diffidente")||prof.includes("riservato"))?"asciutto":"cordiale"]),
    INFO, BISOGNI, ORDINE, PROPOSTE, DOMANDE, THEMES:C.THEMES, NEED_AREA:C.NEED_AREA,
    riga:`${id.eta} anni · ${id.mestiere}${id.f1?` · genitore`:""}`
  };
}

   V9 — MACCHINA A FASI (stato-centrico)
   Non si valuta il fare domande, ma l'accompagnare il cliente:
   fidarsi → raccontarsi → comprendere → prendere posizione → agire.
   ============================================================ */
const SOGLIA_AVANZA = 68;
const FASI = [
  {id:1,nome:"Armonizzazione",breve:"crea relazione"},
  {id:2,nome:"Esplorazione",breve:"comprendi il cliente"},
  {id:3,nome:"Consapevolezza",breve:"genera consapevolezza"},
  {id:4,nome:"Presa di posizione",breve:"fai riconoscere i bisogni"},
  {id:5,nome:"Soluzione",breve:"proponi una risposta"}
];
// MODELLO DI ADERENZA: ogni fase ha mosse centrali, ammesse e una mossa-innesco (trigger)
const FASE_CENTRALI={1:["relazione","empatia","osservazione"],2:["scoperta","riformulazione","ponte"],3:["consapevolezza","insight","implicazione","empatia","osservazione"],4:["emersione"],5:["proposta"]};
const FASE_AMMESSE ={1:["riformulazione"],2:["relazione","empatia","osservazione"],3:["riformulazione","ponte"],4:["insight","empatia","riformulazione","ponte"],5:["empatia","riformulazione","insight"]};
const AVANZA={1:["scoperta"],2:["implicazione","insight","consapevolezza"],3:["emersione"],4:["proposta"]}; // mosse che fanno avanzare di fase
const NAT={relazione:1,empatia:1,osservazione:1,riformulazione:2,scoperta:2,ponte:2,implicazione:3,insight:3,consapevolezza:3,emersione:4,proposta:5,vendita:9};
function isTrigger(fam,fase){return (AVANZA[fase]||[]).includes(fam);}
function fitOf(fam,fase){
  if((FASE_CENTRALI[fase]||[]).includes(fam))return"centrale";
  if((FASE_AMMESSE[fase]||[]).includes(fam))return"ammessa";
  if(isTrigger(fam,fase))return"trigger";
  return (NAT[fam]||fase)>fase?"avanti":"indietro";
}
function famNode(q){return ({scoperta:"scoperta",relazione:"relazione",implicazione:"implicazione",ponte:"ponte",vendita:"vendita"})[q.tipo]||"scoperta";}

/* ---- stato ---- */
let CL,S;
function initFasi(cliente){
  CL=cliente;
  S={fase:1,prontezza:0,
     fiducia:CL.statBase.fiducia,apertura:CL.statBase.apertura,pressione:CL.statBase.pressione,consapevolezza:CL.statBase.consapevolezza,
     padronanza:50,coerenzaConv:50,
     discovered:new Set(),areaOpened:new Set(),
     used:new Set(),history:[],need:{},priorityNeed:null,
     coperti:new Set(),consapProg:{},consapUsate:{},mosseTot:0};
  CL.ORDINE.forEach(n=>S.need[n]="latente");
  S.ledger={};[1,2,3,4,5].forEach(f=>S.ledger[f]={turni:0,centrali:0,fuori:0,regr:0});
}
const ILLUM=["illuminato","riconosciuto","prioritizzato","coperto"];
const RICON=["riconosciuto","prioritizzato","coperto"];
function dom(id){return CL.DOMANDE.find(x=>x.id===id);}
function lastQ(){for(let i=S.history.length-1;i>=0;i--){if(S.history[i].q)return S.history[i].q;}return null;}
function recentTags(){const s=new Set();S.history.slice(-2).forEach(h=>(h.tags||[]).forEach(t=>s.add(t)));return s;}
function sogliaF1(){let f=60,a=50,p=24;if(CL.tratti.includes("diffidente")){f+=12;a+=8;}if(CL.tratti.includes("riservato"))a+=6;if(CL.tratti.includes("ansioso"))p-=4;return{f,a,p};}
function themeDepth(t){const tg=CL.THEMES[t]||[];return S.history.filter(h=>(h.tags||[]).some(x=>tg.includes(x))).length;}
function saturo(t){return themeDepth(t)>=2;}
function recompute(){const fr=[];CL.ORDINE.forEach(n=>{if(S.need[n]!=="latente")return;if(CL.BISOGNI[n].requisiti.every(g=>g.some(i=>S.discovered.has(i)))){S.need[n]="emerso";fr.push(n);}});return fr;}
function connTarget(){ // un bisogno 'emerso' con substrato da illuminare
  let best=null,bn=0;
  for(const n of CL.ORDINE){if(S.need[n]!=="emerso")continue;const c=[...S.discovered].filter(i=>(CL.INFO[i].bisogni||[]).includes(n)).length;if(c>bn){bn=c;best=n;}}
  return best;
}
function prontezza(){
  const f=S.fase;
  if(f===1){const s=sogliaF1();const r=Math.min(S.fiducia/s.f,S.apertura/s.a);const pen=S.pressione>s.p?(S.pressione-s.p)*2:0;return clamp(r*100-pen);}
  if(f===2){const em=CL.ORDINE.filter(n=>S.need[n]!=="latente").length;return clamp(em*30+(connTarget()?22:0)+Math.min(S.discovered.size,5)*7);}
  if(f===3){const il=CL.ORDINE.filter(n=>ILLUM.includes(S.need[n]));const crit=il.some(n=>CL.BISOGNI[n].critico);if(crit)return clamp(62+(S.consapevolezza/CL.sogliaConsap)*38);return clamp((S.consapevolezza/CL.sogliaConsap)*45+il.length*14);}
  if(f===4){const ric=CL.ORDINE.filter(n=>RICON.includes(S.need[n])).length;return clamp(ric*45+(S.priorityNeed?45:0));}
  return 100;
}
function reqMet(r){if(!r)return true;if(r.opening)return true;if(r.info&&!r.info.every(i=>S.discovered.has(i)))return false;if(r.asked&&!r.asked.every(a=>S.used.has(a)))return false;if(r.need&&!(S.need[r.need]&&S.need[r.need]!=="latente"))return false;if(r.apertura&&S.apertura<r.apertura)return false;if(r.areaOpen&&!S.areaOpened.has(r.areaOpen))return false;if(r.saturo&&!saturo(r.saturo))return false;if(r.needNot&&S.need[r.needNot]&&S.need[r.needNot]!=="latente")return false;return true;}
function frontier(){return CL.DOMANDE.filter(q=>!S.used.has(q.id)&&reqMet(q.requires));}

/* ---- mosse disponibili (operatori) ---- */
function mosse(){
  const out=[];
  frontier().forEach(q=>{ if(q.tipo==="implicazione" && CL.BISOGNI[q.target] && CL.BISOGNI[q.target].consap) return; out.push({k:"q:"+q.id,fam:famNode(q),node:q,label:q.testo,badge:q.cat,tipo:q.tipo}); });
  // CONSAPEVOLEZZA (Fase 3): mosse generate dal contenuto del bisogno, finché è 'emerso'
  CL.ORDINE.forEach(n=>{ const C=CL.BISOGNI[n].consap; if(!C) return; if(S.need[n]!=="emerso") return;
    ["osservazione","curiosita","proiezione","contrasto","implicazione"].forEach(sub=>{
      out.push({k:"k:"+sub+":"+n,fam:"consapevolezza",sub,target:n,label:C[sub],badge:sub,tipo:"consapevolezza"}); }); });
  if(S.history.length){
    const lq=lastQ();
    if(lq){
      const opts=restOptions();
      const r=opts.find(o=>o.tipo==="riformulazione");if(r)out.push({k:"r:rifor",fam:"riformulazione",rest:r,label:r.testo,badge:"riformulazione",tipo:"restituzione"});
      const e=opts.find(o=>o.tipo==="empatia");if(e)out.push({k:"r:emp",fam:"empatia",rest:e,label:e.testo,badge:"empatia",tipo:"restituzione"});
      out.push({k:"r:oss",fam:"osservazione",rest:{tipo:"osservazione",testo:pick(["Noto che su questo punto cambia tono.","Mi accorgo che questo tema la tocca più di altri.","Vedo che qui rallenta, come se pesasse."])},label:"(osservazione) "+"Noto un cambiamento mentre ne parla.",badge:"osservazione",tipo:"restituzione"});
      const tgt=connTarget();
      const ins=opts.find(o=>o.tipo==="insight");
      if(ins)out.push({k:"r:ins",fam:"insight",rest:ins,label:ins.testo,badge:"insight",tipo:"restituzione",target:tgt});
    }
  }
  // emersione (Fase 4)
  const illum=CL.ORDINE.filter(n=>S.need[n]==="illuminato");
  if(illum.length) out.push({k:"e:sintesi",fam:"emersione",emers:"sintesi",label:"Riepiloghi ciò che è emerso e lo specchi al cliente.",badge:"sintesi bisogni",tipo:"emersione"});
  const ricon=CL.ORDINE.filter(n=>RICON.includes(S.need[n]));
  if(ricon.length && !S.priorityNeed) out.push({k:"e:posizione",fam:"emersione",emers:"posizione",label:"«Se potesse occuparsi di una cosa sola, adesso, quale sarebbe?»",badge:"presa di posizione",tipo:"emersione"});
  // proposte (Fase 5) — solo per bisogni riconosciuti
  const perProp=CL.ORDINE.filter(n=>RICON.includes(S.need[n])&&!S.coperti.has(n));
  perProp.forEach(n=>{Object.entries(CL.PROPOSTE).filter(([pid,p])=>p.bisogno===n).forEach(([pid,p])=>{
    out.push({k:"p:"+pid,fam:"proposta",prop:pid,bisogno:n,label:"Proponi: "+p.nome,badge:"proposta",tipo:"proposta"});
  });});
  return out;
}

/* ---- testi restituzione (riuso) ---- */

function restOptions(){

  const opts=[{tipo:"riformulazione",testo:pick(REST_TESTO.riformulazione[tag]||REST_TESTO.riformulazione.default)}];

  else opts.push({tipo:"insight",testo:pick(REST_TESTO.insight.default),target:null});

}

/* ---- emozioni / cue ---- */
function emotionState(){
  if(S.pressione>=55)return"Irritato";if(S.pressione>=32)return"Diffidente";
  if(S.consapevolezza>=28&&S.fase>=3)return"Interessato";
  if(S.fiducia>=65&&S.apertura>=52&&S.pressione<=20)return"Coinvolto";
  if(S.fiducia>=55&&S.pressione<=22)return"Sereno";return"Prudente";}
const EMO_COLOR={Sereno:"#0f766e",Prudente:"#64748b",Interessato:"#2563eb",Coinvolto:"#7c3aed",Diffidente:"#b45309",Irritato:"#dc2626"};
const EMO_BG={Sereno:"#e7f3f1",Prudente:"#eef2f6",Interessato:"#e7f0fb",Coinvolto:"#f0eafb",Diffidente:"#fbf0e3",Irritato:"#fbeaea"};
const CUES={Coinvolto:["si sporge in avanti","annuisce con convinzione"],Interessato:["inclina la testa, incuriosito"],Sereno:["annuisce tranquillo"],Prudente:["misura le parole"],Diffidente:["incrocia le braccia"],Irritato:["sospira, guarda l'orologio"]};
const ANS_CUES={nostalgia:["lo sguardo si perde lontano"],orgoglio:["si raddrizza, fiero"],paura:["abbassa la voce"],preoccupazione:["una ruga sulla fronte"]};

/* ============================================================
   PLAY — operatore unico sullo stato
   ============================================================ */
let convoEl;
function addMsg(kind,html){const d=document.createElement("div");d.className="msg "+kind;d.innerHTML=html;convoEl.appendChild(d);convoEl.scrollTop=convoEl.scrollHeight;}
function fn(){return CL.nome.split(" ")[0];}

function play(m){
  S.mosseTot++;
  const fam=m.fam;
  // avanzamento guidato: solo la mossa-innesco della fase, con prontezza sufficiente
  let avanzato=null;
  const illumExists=CL.ORDINE.some(n=>S.need[n]==="illuminato"||RICON.includes(S.need[n]));
  if(isTrigger(fam,S.fase) && prontezza()>=SOGLIA_AVANZA && (fam!=="proposta"||S.priorityNeed) && (fam!=="emersione"||illumExists)){ S.fase=S.fase+1; avanzato=S.fase; }
  const fit=fitOf(fam,S.fase);
  S.ledger[S.fase].turni++;
  if(fit==="centrale")S.ledger[S.fase].centrali++;
  if(fit==="avanti"||fit==="trigger")S.ledger[S.fase].fuori++;

  if(m.tipo==="restituzione") return playRest(m,fit);
  if(m.tipo==="emersione") return playEmersione(m,fit,avanzato);
  if(m.tipo==="proposta") return playProposta(m,fit,avanzato);
  if(m.tipo==="consapevolezza") return playConsap(m,fit,avanzato);
  return playDomanda(m,fit,avanzato);
}

function bandFeedback(avanzato,fit,extra){
  if(avanzato){addMsg("sys ok",`→ Sei passato alla <b>Fase ${avanzato} · ${FASI[avanzato-1].nome}</b>.`);}
  if(extra)addMsg(extra.cls,extra.txt);
}
function clamps(){["fiducia","apertura","pressione","consapevolezza","padronanza","coerenzaConv"].forEach(k=>S[k]=clamp(S[k]));}

function playDomanda(m,fit,avanzato){
  const q=m.node; S.used.add(q.id);
  const eff={...(q.eff||{})};
  // regressione: scoperta quando fase>=3
  let nota=null;
  if(m.fam==="scoperta" && S.fase>=3){
    const legit = (q.rivela||[]).some(i=>!S.discovered.has(i));
    if(legit){ S.ledger[S.fase].regr++; S.padronanza+=2; nota={cls:"sys thread",txt:`↩ Rientri un attimo in Esplorazione sull'area appena aperta: è una regressione legittima.`}; }
    else { S.coerenzaConv-=6; S.pressione+=3; S.padronanza-=2; S.ledger[S.fase].fuori++; nota={cls:"sys bad",txt:`Stai raccogliendo dati in fase di Consapevolezza: «questo me l'ha già detto». La consapevolezza non cresce così.`}; }
  }
  // fuori fase in avanti / innesco prematuro (prontezza insufficiente)
  if(fit==="avanti"||fit==="trigger"){
    const dist=Math.max(1,(NAT[m.fam]||S.fase)-S.fase);
    S.pressione+=4*dist; S.fiducia-=2*dist; S.padronanza-=3+dist;
    nota={cls:"sys bad",txt:`Mossa fuori fase (anticipata di ${dist}): in ${FASI[S.fase-1].nome} è troppo presto. ${fn()} si irrigidisce.`};
  }else if(fit==="centrale"){S.padronanza+=3;}
  // applica effetti (smorzati se fuori fase)
  const mult=(fit==="avanti"||fit==="trigger")?0.4:1;
  if((q.tipo==="relazione"||q.tipo==="scoperta")&&eff.fiducia>0)eff.fiducia*=CL.reazioni.relazione;
  S.fiducia+=(eff.fiducia||0)*mult; S.apertura+=(eff.apertura||0)*mult; S.pressione+=(eff.pressione||0);
  if(q.tipo==="ponte"){S.areaOpened.add(q.opens);}
  (q.rivela||[]).forEach(i=>S.discovered.add(i));
  const fresh=recompute();
  let illuminated=null;
  if(q.tipo==="implicazione"&&S.need[q.target]==="emerso"){const g=(q.target.indexOf("protezione")===0)?CL.reazioni.minimizza:1;S.consapevolezza+=Math.round(q.consapBase*g);S.need[q.target]="illuminato";illuminated=q.target;}
  // continuità
  const rt=recentTags();const cont=(q.tags||[]).some(t=>rt.has(t));S.coerenzaConv+=cont?2:(fit==="centrale"?0:-2);
  S.history.push({q,tags:q.tags||[],emotion:q.emotion,fit});
  clamps();
  // render messaggi
  const myText=q.tipo==="ponte"?`<span style="opacity:.85">${q.framing}</span><br><br>${q.testo}`:q.testo;
  addMsg("me",`<div class="txt">${myText}</div>`);
  addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${q.reply}</div>`);
  const st=emotionState();const cue=q.emotion&&ANS_CUES[q.emotion]?pick(ANS_CUES[q.emotion]):pick(CUES[st]||CUES.Prudente);
  addMsg("cue",`${fn()} ${cue}.`);
  bandFeedback(avanzato,fit,nota);
  (q.rivela||[]).forEach(i=>{if(S.discovered.has(i))addMsg("sys",`Scoperto: ${CL.INFO[i].testo}`);});
  fresh.forEach(i=>addMsg("sys need",`★ Area di attenzione emersa: <b>${CL.BISOGNI[i].label}</b>.`));
  if(illuminated)addMsg("sys need",`↑ Consapevolezza generata su <b>${CL.BISOGNI[illuminated].label}</b>.`);
  if(q.tipo==="vendita")addMsg("sys bad",`Spinta di vendita: brucia la fiducia.`);
  postTurn();
}

function playRest(m,fit){
  const o=m.rest, r=CL.reazioni;
  addMsg("me rest",`<div class="txt">${o.testo}</div>`);
  // fit di contesto (oltre alla fase)
  let causa=null;
  if(o.tipo==="empatia"&&!CHARGED.includes((lastQ()||{}).emotion))causa="empatia_neutra";
  if(o.tipo==="insight"&&!o.target)causa="insight_vuoto";
  const fuoriFase=(fit==="avanti"||fit==="indietro");
  if(causa||fuoriFase){
    S.fiducia-=3*r.prematura;S.apertura-=2;S.pressione+=4*r.prematura;S.padronanza-=3;
    const linea=causa?reazioneArtificiale(causa,CL.tratti):pick(["Mi sembra che stia correndo.","Aspetti, non così in fretta."]);
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${linea}</div>`);
    addMsg("cue",`${fn()} ${pick(CUES.Diffidente)}.`);
    if(fuoriFase&&!causa)addMsg("sys bad",`Restituzione fuori fase: in ${FASI[S.fase-1].nome} non è il momento.`);
  } else {
    if(o.tipo==="riformulazione"){S.fiducia+=4*r.rifor*r.relazione;S.apertura+=4*r.rifor;addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("riformulazione")}</div>`);}
    else if(o.tipo==="empatia"){S.fiducia+=5*r.emp;S.apertura+=4*r.emp;S.pressione-=3*r.emp;addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("empatia")}</div>`);}
    else if(o.tipo==="osservazione"){S.fiducia+=3;S.apertura+=3;addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${pick(["...Sì. È vero, non me ne rendevo conto.","Eh. Si vede tanto?"])}</div>`);}
    else if(o.tipo==="insight"){const g=Math.round(12*r.ins);S.consapevolezza+=g;const t=o.target;if(t&&S.need[t]==="emerso"){S.need[t]="illuminato";const area=CL.NEED_AREA[t];if(area&&!S.areaOpened.has(area)){S.areaOpened.add(area);addMsg("sys thread",`La tua sintesi apre una nuova area: <b>${CL.BISOGNI[t].label}</b>.`);}addMsg("sys need",`↑ Hai reso consapevole <b>${CL.BISOGNI[t].label}</b> (+${g}).`);}S.fiducia+=2;addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${accetta("insight")}</div>`);}
    S.coerenzaConv+=3; if(fit==="centrale")S.padronanza+=3;
    addMsg("cue",`${fn()} ${pick(CUES.Coinvolto.concat(CUES.Interessato))}.`);
  }
  S.history.push({rest:o.tipo,tags:(lastQ()||{}).tags||[],emotion:(lastQ()||{}).emotion,fit});
  clamps();postTurn();
}

function playEmersione(m,fit,avanzato){
  if(fit==="avanti"){ // prematuro
    S.pressione+=8;S.fiducia-=3;S.padronanza-=4;
    addMsg("me",`<div class="txt">${m.label}</div>`);
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${pick(["Aspetti, di cosa stiamo parlando esattamente?","Mi sta mettendo fretta su cose che non ho ancora messo a fuoco."])}</div>`);
    addMsg("sys bad",`Emersione prematura: il cliente non ha ancora «visto» abbastanza.`);
    S.history.push({tags:[],emotion:null,fit});clamps();postTurn();return;
  }
  if(m.emers==="sintesi"){
    const ill=CL.ORDINE.filter(n=>S.need[n]==="illuminato");
    ill.forEach(n=>S.need[n]="riconosciuto");
    const labels=CL.ORDINE.filter(n=>RICON.includes(S.need[n])).map(n=>CL.BISOGNI[n].label.toLowerCase());
    addMsg("me",`<div class="txt">Mettiamo in fila ciò che è emerso: ${labels.join(", ")}. Sono cose che la riguardano da vicino.</div>`);
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${pick(["...Sì. Detta così, sono cose mie. Non le avevo mai messe in fila.","Eh. Riconosco che è proprio la mia situazione."])}</div>`);
    addMsg("sys need",`I bisogni illuminati diventano <b>riconosciuti</b> dal cliente.`);
    S.padronanza+= (fit==="centrale")?4:0; S.consapevolezza+=4;
  } else { // presa di posizione
    const cand=CL.ORDINE.filter(n=>RICON.includes(S.need[n]));
    const crit=cand.find(n=>CL.BISOGNI[n].critico)||cand.sort((a,b)=>CL.BISOGNI[b].peso-CL.BISOGNI[a].peso)[0];
    S.priorityNeed=crit; if(crit)S.need[crit]="prioritizzato";
    addMsg("me",`<div class="txt">${m.label}</div>`);
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${crit?`${pick(["Questo, senza dubbio:","Se devo scegliere,"])} ${CL.BISOGNI[crit].label.toLowerCase()}. ${CL.paura}`:"Non saprei da dove iniziare."}</div>`);
    addMsg("cue",`${fn()} ${pick(["prende posizione, con fermezza","abbassa lo sguardo, poi annuisce deciso"])}.`);
    if(crit)addMsg("sys need",`Il cliente prende posizione: <b>${CL.BISOGNI[crit].label}</b> è la priorità.`);
    S.padronanza+=(fit==="centrale")?5:0; S.fiducia+=3;
  }
  S.history.push({tags:[],emotion:null,fit});bandFeedback(avanzato,fit,null);clamps();postTurn();
}

function playProposta(m,fit,avanzato){
  const p=CL.PROPOSTE[m.prop], n=m.bisogno;
  addMsg("me",`<div class="txt">Per ${CL.BISOGNI[n].label.toLowerCase()}, le propongo: ${p.nome}. ${p.desc}</div>`);

    addMsg("sys need",`<b>${CL.BISOGNI[n].label}</b> trova una risposta pertinente (pertinenza ${p.pert}).`);
  }
  S.history.push({tags:[],emotion:null,fit,prop:m.prop,bisogno:n,pert:p.pert,riconosciuto});
  bandFeedback(avanzato,fit,null);clamps();postTurn();
}

function qualitaConsap(sub){
  const base={osservazione:52,curiosita:70,proiezione:66,contrasto:58,implicazione:60}[sub];
  let q=base+(S.fiducia-50)*0.30+(S.apertura-50)*0.30+(Math.random()*24-12);
  const SH={
    diffidente:{implicazione:-16,contrasto:-10,proiezione:-4,curiosita:-3},
    razionale:{implicazione:-8,curiosita:6,contrasto:2,proiezione:-3},
    ansioso:{proiezione:10,implicazione:-8,contrasto:-3},
    ottimista:{osservazione:-6,curiosita:-6,proiezione:-6,contrasto:-6,implicazione:-6},
    orgoglioso:{contrasto:-10,curiosita:3},
    sbrigativo:{proiezione:-10,curiosita:5,osservazione:-3},
    riservato:{curiosita:-3,osservazione:-2,proiezione:-2},
    storico:{contrasto:-5,proiezione:3}
  };
  (CL.tratti||[]).forEach(tr=>{const sh=SH[tr];if(sh&&sh[sub]!=null)q+=sh[sub];});
  return q;
}
function esitoConsap(sub,n){
  if(S.need[n]!=="emerso") return "ripetuto";
  const q=qualitaConsap(sub);
  const minim=(CL.reazioni.minimizza>1)||CL.tratti.includes("ottimista");
  const arg=CL.tratti.includes("diffidente")||CL.tratti.includes("razionale")||CL.tratti.includes("orgoglioso");
  if(q>=70) return "piena";
  if(q>=50) return (minim&&(sub==="implicazione"||sub==="contrasto")&&Math.random()<0.4)?"minimizza":"parziale";
  if(q>=34) return minim?"minimizza":"resiste";
  return arg?"controarg":"resiste";
}
function playConsap(m,fit,avanzato){
  const n=m.target, sub=m.sub, C=CL.BISOGNI[n].consap;
  addMsg("me",`<div class="txt">${C[sub]}</div>`);
  if(fit==="avanti"||fit==="trigger"){
    const dist=Math.max(1,3-S.fase);
    S.pressione+=5+dist*2; S.fiducia-=2; S.padronanza-=3;
    addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${pick(["Aspetti, non stiamo correndo un po'?","Mi sta già tirando le somme, ma non le ho ancora raccontato tutto."])}</div>`);
    addMsg("cue",`${fn()} ${pick(CUES.Diffidente)}.`);
    addMsg("sys bad",`Consapevolezza fuori tempo: porti a una conclusione prima di aver esplorato.`);
    S.history.push({consap:sub,target:n,tags:[],fit}); clamps(); postTurn(); return;
  }
  const esito=esitoConsap(sub,n);
  const PRGpiena={osservazione:30,curiosita:50,proiezione:46,contrasto:42,implicazione:44};
  const PADpiena={osservazione:3,curiosita:7,proiezione:6,contrasto:4,implicazione:2};
  const PADparz ={osservazione:2,curiosita:3,proiezione:3,contrasto:2,implicazione:1};
  const PRESS_SUB={osservazione:0,curiosita:0,proiezione:1,contrasto:4,implicazione:7};
  let dprog={piena:PRGpiena[sub],parziale:24,resiste:8,minimizza:3,controarg:0,ripetuto:0}[esito];
  let dpad ={piena:PADpiena[sub],parziale:PADparz[sub],resiste:-1,minimizza:-1,controarg:-3,ripetuto:-2}[esito];
  let dpress=PRESS_SUB[sub];
  if(esito==="controarg") dpress+=3+PRESS_SUB[sub];
  else if(esito==="resiste") dpress+=2;
  else if(esito==="minimizza") dpress+=1;
  S.consapUsate[n]=S.consapUsate[n]||[];
  if(sub==="implicazione" && !S.consapUsate[n].some(x=>x!=="implicazione")){
    dpad-=2; addMsg("sys bad",`Hai detto la conclusione invece di farla scoprire: in Consapevolezza la stoccata diretta costa.`);
  }
  S.consapUsate[n].push(sub);
  S.consapProg[n]=(S.consapProg[n]||0)+dprog;
  S.consapevolezza+=Math.round(dprog*0.45);
  S.pressione+=dpress; S.padronanza+=dpad;
  if(esito==="piena"&&(sub==="curiosita"||sub==="proiezione"))S.apertura+=3;
  if(esito==="minimizza")S.apertura-=2; if(esito==="controarg")S.apertura-=1;
  addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${pick(C.reazioni[esito]||C.reazioni.parziale)}</div>`);
  const cueMap={piena:"Coinvolto",parziale:"Interessato",resiste:"Prudente",minimizza:"Prudente",controarg:"Diffidente",ripetuto:"Prudente"};
  addMsg("cue",`${fn()} ${pick(CUES[cueMap[esito]]||CUES.Prudente)}.`);
  if(S.need[n]==="emerso" && S.consapProg[n]>=55){S.need[n]="illuminato";addMsg("sys need",`↑ <b>${CL.BISOGNI[n].label}</b>: il cliente ne ha preso coscienza.`);}
  else if(S.need[n]==="emerso"){addMsg("sys",`(Presa di coscienza in costruzione su ${CL.BISOGNI[n].label.toLowerCase()}: ${Math.min(99,Math.round(S.consapProg[n]))}%.)`);}
  const lab={piena:"Piena presa di coscienza",parziale:"Consapevolezza parziale",resiste:"Resiste",minimizza:"Minimizza",controarg:"Controargomenta",ripetuto:"Già acquisito"}[esito];
  addMsg("sys",`${sub} · ${lab}`);
  S.history.push({consap:sub,target:n,esito,tags:[],fit});
  clamps(); bandFeedback(avanzato,fit,null); postTurn();
}

function postTurn(){
  S.prontezza=prontezza();
  renderTop();renderDossier();renderMosse();
  setStatus();
  if(S.mosseTot>=26)addMsg("sys",`(Il tempo del colloquio è quasi finito.)`);
}

/* ============================================================
   RENDER
   ============================================================ */
function setStatus(){const e=emotionState();$("emo").textContent=e;$("emo").style.color=EMO_COLOR[e];$("emo").style.background=EMO_BG[e];}
function renderTop(){
  $("moves").innerHTML=`Mosse <b>${S.mosseTot}</b>`;
  const d=[["Fiducia","fiducia","--c-fiducia"],["Apertura","apertura","--c-apertura"],["Pressione","pressione","--c-pressione"],["Consap.","consapevolezza","--c-consap"]];
  $("strip").innerHTML=d.map(([l,k,c])=>`<div class="chip"><div class="h">${l}<b>${Math.round(S[k])}</b></div><div class="bar"><i style="width:${S[k]}%;background:var(${c})"></i></div></div>`).join("");
  // stepper fasi
  const step=FASI.map(f=>`<div class="fstep ${f.id===S.fase?'on':(f.id<S.fase?'done':'')}"><span class="fn">${f.id}</span><span class="fl">${f.nome}</span></div>`).join('<span class="farrow">›</span>');
  const pr=Math.round(S.prontezza);
  const ready=pr>=SOGLIA_AVANZA && S.fase<5;
  $("phasebar").innerHTML=`<div class="fsteps">${step}</div>
    <div class="prontezza"><div class="pl">Prontezza · ${FASI[S.fase-1].breve}</div><div class="pbar"><i style="width:${pr}%;background:${ready?'#0f766e':'#94a3b8'}"></i></div>${ready?'<div class="pready">Pronto per la fase successiva</div>':''}</div>
    <div class="pmastery">Padronanza del Metodo: <b>${Math.round(S.padronanza)}</b></div>`;
}
function renderDossier(){
  const vis=CL.visibili.map(t=>`<div class="item">${t}</div>`).join("");
  const sco=S.discovered.size?[...S.discovered].map(i=>`<div class="item">${CL.INFO[i].testo}</div>`).join(""):`<div class="empty">Nessuna ancora.</div>`;
  const STAGE={latente:"",emerso:'<span class="tag disc">emerso</span>',illuminato:'<span class="tag illum">illuminato</span>',riconosciuto:'<span class="tag ric">riconosciuto</span>',prioritizzato:'<span class="tag pri">priorità</span>',coperto:'<span class="tag cov">coperto</span>'};
  let bis="";CL.ORDINE.forEach(n=>{const st=S.need[n];if(st==="latente"){bis+=`<div class="need locked"><span>??? — non emerso</span></div>`;return;}let t=(CL.BISOGNI[n].critico?'<span class="tag crit">critico</span>':'')+STAGE[st];bis+=`<div class="need"><span>${CL.BISOGNI[n].label}</span><span class="tags">${t}</span></div>`;});
  $("dossier").innerHTML=`<div class="group"><h4>Visibili</h4>${vis}</div><div class="group"><h4>Scoperte</h4>${sco}</div><div class="group"><h4>Bisogni</h4>${bis}</div>`;
}
function renderMosse(){
  const ms=mosse();
  const buckets={infase:[],avanza:[],fuori:[]};
  ms.forEach(m=>{const fit=fitOf(m.fam,S.fase);
    if(isTrigger(m.fam,S.fase))buckets.avanza.push({m,fit:"trigger"});
    else if(fit==="centrale"||fit==="ammessa")buckets.infase.push({m,fit});
    else buckets.fuori.push({m,fit});});
  const card=(o)=>{const m=o.m;const cls=o.fit==="trigger"?"avanza":(o.fit==="centrale"?"centrale":(o.fit==="ammessa"?"ammessa":"fuori"));
    return `<button class="q ${cls}" data-k="${m.k}"><div class="badges"><span class="b cat">${m.badge}</span><span class="b ${m.tipo}">${m.tipo}</span></div><div class="qtext">${m.label}</div></button>`;};
  let h="";
  if(buckets.infase.length)h+=`<div class="qsec"><div class="qsec-label p1">● In questa fase — ${FASI[S.fase-1].nome}</div><div class="q-list">${buckets.infase.map(card).join("")}</div></div>`;
  if(buckets.avanza.length)h+=`<div class="qsec"><div class="qsec-label pb">● Per passare alla fase successiva ${S.prontezza>=SOGLIA_AVANZA?'— sei pronto':'— attento al tempismo'}</div><div class="q-list">${buckets.avanza.map(card).join("")}</div></div>`;
  if(buckets.fuori.length)h+=`<div class="qsec"><div class="qsec-label p3">● Sconsigliate ora</div><div class="q-list">${buckets.fuori.map(card).join("")}</div></div>`;
  h+=`<button class="btn ghost" id="concludi" style="margin-top:6px">Concludi il colloquio →</button>`;
  $("qarea").innerHTML=h;
  $("qarea").querySelectorAll("button.q[data-k]").forEach(b=>b.onclick=()=>{const m=mosse().find(x=>x.k===b.dataset.k);if(m)play(m);});
  $("concludi").onclick=debrief;
}

/* ============================================================
   DEBRIEF orientato agli errori di fase
   ============================================================ */
function debrief(){
  const crit=CL.ORDINE.find(n=>CL.BISOGNI[n].critico);
  const critCoperto=S.need[crit]==="coperto";
  const critRic=RICON.includes(S.need[crit]);
  const coperti=CL.ORDINE.filter(n=>S.need[n]==="coperto");
  const fuoriTot=[1,2,3,4,5].reduce((a,f)=>a+S.ledger[f].fuori,0);
  const regrTot=[1,2,3,4,5].reduce((a,f)=>a+S.ledger[f].regr,0);
  let esito,kind;
  if(S.pressione>=70||S.fiducia<=20){esito="Cliente perso";kind="bad";}
  else if(!coperti.length){esito=critRic?"Appuntamento successivo":"Nessun accordo";kind=critRic?"warn":"muted";}
  else if(critCoperto&&S.padronanza>=70&&S.pressione<=22&&S.priorityNeed){esito="Cliente Promotore";kind="good";}
  else if(critCoperto&&S.padronanza>=55){esito="Cliente Fidelizzato";kind="good";}
  else if(coperti.length>=2){esito="Cross Selling";kind="good";}
  else{esito="Vendita";kind="good";}
  const col={good:"var(--good)",warn:"var(--warn)",bad:"var(--bad)",muted:"var(--muted)"}[kind];
  const bg={good:"#e7f3f1",warn:"#fbf0e3",bad:"#fbeaea",muted:"#eef2f6"}[kind];

  const fb=[];
  fb.push([fuoriTot===0?"good":"bad","Disciplina di fase",fuoriTot===0?"Nessuna mossa fuori fase: hai rispettato il percorso.":`${fuoriTot} mosse fuori fase. Il metodo si impara col tempismo, non con le mosse giuste fatte al momento sbagliato.`]);
  fb.push([regrTot>0?"good":"tip","Regressioni",regrTot>0?`${regrTot} ritorni legittimi a esplorare aree appena aperte: buona consulenza.`:"Nessuna regressione: va bene se il percorso è filato, ma non temere di tornare indietro quando emerge qualcosa di nuovo."]);
  if(critCoperto)fb.push(["good","Bisogno critico",`${CL.BISOGNI[crit].label}: riconosciuto dal cliente e coperto con una risposta pertinente.`]);
  else if(critRic)fb.push(["tip","Bisogno critico",`${CL.BISOGNI[crit].label} era riconosciuto, ma non gli hai dato una risposta.`]);
  else if(S.need[crit]==="illuminato")fb.push(["bad","Bisogno critico",`Avevi illuminato ${CL.BISOGNI[crit].label.toLowerCase()}, ma il cliente non è arrivato a prenderne posizione (Fase 4 mancata).`]);
  else fb.push(["bad","Bisogno critico",`${CL.BISOGNI[crit].label} non è mai diventato consapevole.`]);
  if(!S.priorityNeed)fb.push(["bad","Presa di posizione","Il cliente non ha mai preso posizione su ciò che conta di più: la consulenza è rimasta in superficie."]);
  if(S.fase<3)fb.push(["bad","Percorso interrotto","Ti sei fermato troppo presto: non hai accompagnato il cliente fino alla consapevolezza."]);

  const tempo=[1,2,3,4,5].map(f=>`<span style="display:inline-block;min-width:104px">${FASI[f-1].nome}: <b>${S.ledger[f].turni}</b></span>`).join("");
  $("main").innerHTML=`
    <div class="verdict"><span class="badge" style="color:${col};background:${bg}">Esito</span><h2 style="color:${col}">${esito}</h2>
      <div class="sub">${CL.nome} · scenario: ${CL.scenario} · ${CL.tratti.join(", ")}</div>
      <div class="sub" style="margin-top:3px;font-style:italic">Nucleo: ${CL.paura}</div></div>
    <div class="hr"></div><h3 class="block">Padronanza del Metodo</h3>
    <div class="db-stat"><div class="h">Padronanza<b>${Math.round(S.padronanza)}</b></div><div class="bar"><i style="width:${S.padronanza}%;background:#7c3aed"></i></div></div>
    <div style="font-size:12.5px;color:var(--muted);margin-top:10px">Tempo per fase — ${tempo}</div>
    <div class="hr"></div><h3 class="block">Lettura del percorso</h3>
    ${fb.map(([k,t,x])=>`<div class="fb ${k}"><div class="t">${t}</div>${x}</div>`).join("")}
    <div class="fb tip" style="margin-top:6px"><div class="t">Principio</div>Non conta quante domande hai fatto, ma se hai accompagnato il cliente: fidarsi → raccontarsi → comprendere → prendere posizione → agire.</div>
    <button class="btn primary" id="again" style="margin-top:18px">Nuovo cliente ↺</button>`;
  $("again").onclick=intro;$("main").scrollIntoView({behavior:"smooth",block:"start"});
}

/* ============================================================
   INTRO / AVVIO
   ============================================================ */
function intro(){
  $("strip").innerHTML="";$("moves").innerHTML="";$("dossier").innerHTML="";if($("phasebar"))$("phasebar").innerHTML="";
  const cards=ARCHETIPI.map(a=>`<button class="arche" data-arch="${a.id}"><div class="an">${a.nome}<span class="diff">${[1,2,3,4,5].map(n=>`<i class="${n<=a.difficolta?'on':''}"></i>`).join("")}</span></div><div class="ad">${a.desc}</div><div class="traits"><span class="tr">${a.scenari.length} scenari</span><span class="tr">5 fasi consulenziali</span></div></button>`).join("");
  $("main").innerHTML=`<div class="intro"><h2>Consulente Simulator · V9</h2>
    <p class="lead">La V9 è costruita sulle <b>cinque fasi</b> di una consulenza reale: Armonizzazione → Esplorazione → Consapevolezza → Presa di posizione → Soluzione. Non si valuta il fare domande, ma la capacità di <b>accompagnare il cliente</b>: fidarsi → raccontarsi → comprendere → prendere posizione → agire. Ogni mossa ha un suo momento giusto; il tempismo è la competenza centrale.</p>
    <div class="pick">${cards}</div>
    <p class="hint">Vedrai sempre in quale fase sei e una barra di prontezza. Si avanza facendo la mossa giusta al momento giusto — non c'è un pulsante "avanza".</p></div>`;
  $("main").querySelectorAll("button.arche").forEach(b=>b.onclick=()=>avvia(b.dataset.arch));
}
function avvia(archId){
  const cliente=generaCliente(archId);initFasi(cliente);
  $("main").innerHTML=`<div class="intro"><h2>${cliente.nome}</h2>
    <div class="person"><div class="avatar">${cliente.nome.split(" ").map(w=>w[0]).join("").slice(0,2)}</div><div><div style="font-weight:700">${cliente.nome}</div><div style="font-size:12.5px;color:var(--muted)">${cliente.riga} · ${cliente.tratti.join(", ")}</div><div class="traits" style="margin-top:6px"><span class="tr">voce: ${cliente.voce}</span></div></div></div>
    <div class="qsec-label p3">Appunti pre-incontro</div><ul class="vis">${cliente.visibili.map(v=>`<li>${v}</li>`).join("")}</ul>
    <p class="hint">Difficoltà ${cliente.difficolta}/5. Inizia dall'Armonizzazione: prima la relazione, poi tutto il resto.</p>
    <button class="btn primary" id="start" style="margin-top:14px">Inizia il colloquio →</button></div>`;
  $("start").onclick=startConvo;
}
function startConvo(){
  $("main").innerHTML=`<div id="phasebar" class="phasebar"></div><div id="convo"></div><div class="status"><span class="emo" id="emo"></span></div><div id="qarea"></div>`;
  convoEl=$("convo");
  addMsg("client",`<div class="who">${CL.nome}</div><div class="txt">${CL.apertura}</div>`);
  S.prontezza=prontezza();renderTop();renderDossier();renderMosse();setStatus();
}
intro();
</script>
